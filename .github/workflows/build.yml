name: Build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-13

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in configs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present

          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json
          mv package.tmp.json package.json

          # Update electrobun.config.ts
          sed -i '' "s/version: \".*\"/version: \"$VERSION\"/" electrobun.config.ts

      - name: Build native effects library
        run: bun run build:native-effects

      - name: Build production
        run: bun run build:prod

      - name: Create artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          ARCH="${{ matrix.arch }}"

          cd build/stable

          # Create zip from app bundle
          zip -r "claude-usage-monitor-${VERSION}-darwin-${ARCH}.zip" "Claude Usage Monitor.app"

          # Create DMG
          hdiutil create -volname "Claude Usage Monitor" \
            -srcfolder "Claude Usage Monitor.app" \
            -ov -format UDZO \
            "claude-usage-monitor-${VERSION}-darwin-${ARCH}.dmg"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          ARCH="${{ matrix.arch }}"

          cd build/stable

          # Upload zip and dmg
          gh release upload "${{ github.event.release.tag_name }}" \
            "claude-usage-monitor-${VERSION}-darwin-${ARCH}.zip" \
            "claude-usage-monitor-${VERSION}-darwin-${ARCH}.dmg" \
            --clobber

          # Upload update artifacts if they exist
          if [ -f "stable-macos-${ARCH}-update.json" ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "stable-macos-${ARCH}-update.json" \
              --clobber
          fi

          # Upload compressed app for updates
          for f in stable-macos-${ARCH}-*.tar.zst; do
            if [ -f "$f" ]; then
              gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
            fi
          done

          # Upload patch files
          for f in *.patch; do
            if [ -f "$f" ]; then
              gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
            fi
          done

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            build/stable/*.zip
            build/stable/*.dmg
            build/stable/*-update.json
            build/stable/*.tar.zst
            build/stable/*.patch
