name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build:frontend

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare platform package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p packages/darwin-arm64/{bin,src,dist}
          cp -r bin packages/darwin-arm64/
          cp -r src/bun src/cli src/shared packages/darwin-arm64/src/
          cp -r dist packages/darwin-arm64/
          jq --arg v "$VERSION" '.version = $v' packages/darwin-arm64/package.json > tmp.json
          mv tmp.json packages/darwin-arm64/package.json

      - name: Publish platform package
        working-directory: packages/darwin-arm64
        run: npm publish --access public --provenance

      - name: Prepare main package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v | .optionalDependencies["@agentika/daedux-darwin-arm64"] = $v' package.json > tmp.json
          mv tmp.json package.json

      - name: Publish main package
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
