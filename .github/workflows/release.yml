name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run check

      - name: Format check
        run: bunx oxfmt --check .

  build-desktop:
    needs: ci
    runs-on: macos-14 # ARM64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Electrobun CLI
        uses: actions/cache@v4
        with:
          path: node_modules/electrobun/.cache
          key: electrobun-cli-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package.json') }}
          restore-keys: |
            electrobun-cli-${{ runner.os }}-${{ runner.arch }}-

      - name: Warm Electrobun CLI cache
        run: bun run electrobun --version || true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in configs
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json
          mv package.tmp.json package.json

          # Update electrobun.config.ts
          sed -i '' "s/version: \".*\"/version: \"$VERSION\"/" electrobun.config.ts

      - name: Install Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build native effects library
        run: bun run build:native-effects

      - name: Build frontend
        run: bun run build:frontend

      - name: Build Electrobun production app (codesign + notarize)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
        run: bun run electrobun build --env=stable

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd build/stable-macos-arm64

          # Rename DMG to include version and arch
          if [ -f "Daedux.dmg" ]; then
            mv "Daedux.dmg" "daedux-${VERSION}-darwin-arm64.dmg"
          fi

          # Create zip from app bundle
          zip -r "daedux-${VERSION}-darwin-arm64.zip" "Daedux.app"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin-arm64
          path: |
            build/stable-macos-arm64/*.zip
            build/stable-macos-arm64/*.dmg
            build/stable-macos-arm64/*-update.json
            build/stable-macos-arm64/*.tar.zst
            build/stable-macos-arm64/*.patch

  publish-npm:
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

      - name: Publish to NPM
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.txt || {
            if grep -q "You cannot publish over the previously published versions" /tmp/npm-out.txt; then
              echo "Version already published, skipping..."
            else
              cat /tmp/npm-out.txt
              exit 1
            fi
          }

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only create release on tag push

    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-darwin-arm64
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
