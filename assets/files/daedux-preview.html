<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daedux Icon Preview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 20px;
        gap: 60px;
      }
      h1 {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #666;
      }
      .row {
        display: flex;
        align-items: end;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .icon-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .icon-wrapper span {
        font-size: 11px;
        color: #555;
        font-weight: 500;
      }
      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      .section-title {
        font-size: 12px;
        color: #444;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .variants {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <h1>Daedux — App Icon</h1>

    <!-- Main icon at large size -->
    <div class="section">
      <span class="section-title">Primary — Emerald on Dark</span>
      <div class="row">
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="256"
            height="256"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>256px</span>
        </div>
      </div>
    </div>

    <!-- Scale test -->
    <div class="section">
      <span class="section-title">Scale Test</span>
      <div class="row">
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="128"
            height="128"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>128px</span>
        </div>
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="64"
            height="64"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>64px</span>
        </div>
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="32"
            height="32"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>32px</span>
        </div>
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="16"
            height="16"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>16px</span>
        </div>
      </div>
    </div>

    <!-- Color variants -->
    <div class="section">
      <span class="section-title">Color Variants</span>
      <div class="variants">
        <!-- White on dark -->
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="128"
            height="128"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#ffffff"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>White on Dark</span>
        </div>
        <!-- Emerald on dark (primary) -->
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="128"
            height="128"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"

              stroke-linecap="round"
              stroke-linejoin="round"
            />

        </div>
        <!-- Dark on light -->
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="128"
            height="128"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#f5f5f5" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#0a0a0a"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Dark on Light</span>
        </div>
        <!-- Emerald on light -->
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            width="128"
            height="128"
          >
            <rect width="512" height="512" rx="108" ry="108" fill="#f5f5f5" />
            <path
              d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
              fill="none"
              stroke="#10B981"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Emerald on Light</span>
        </div>
      </div>
    </div>

    <!-- macOS Dock mockup -->
    <div class="section">
      <span class="section-title">macOS Dock Mockup</span>
      <div
        style="
          background: rgba(255, 255, 255, 0.08);
          backdrop-filter: blur(20px);
          border-radius: 20px;
          padding: 12px 20px;
          display: flex;
          gap: 8px;
          align-items: center;
        "
      >
        <!-- Fake dock icons -->
        <div
          style="
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            border-radius: 12px;
          "
        ></div>
        <div
          style="
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #ff6b6b, #cc3333);
            border-radius: 12px;
          "
        ></div>
        <!-- Daedux -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 512 512"
          width="52"
          height="52"
        >
          <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a" />
          <path
            d="M 340,88 L 88,88 L 88,424 L 424,424 L 424,88 L 382,88 L 382,382 L 130,382 L 130,130 L 340,130 L 340,340 L 172,340 L 172,172 L 298,172 L 298,298 L 214,298 L 214,214 L 256,214"
            fill="none"
            stroke="#10B981"
            stroke-width="14"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <div
          style="
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-radius: 12px;
          "
        ></div>
        <div
          style="
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 12px;
          "
        ></div>
      </div>
    </div>
  </body>
</html>
