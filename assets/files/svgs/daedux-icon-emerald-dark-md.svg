<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Square spiral labyrinth — medium tier (3 layers)
    For 64-128px renders.

    Canvas: 512x512
    Safe-area margin: 108px
    Usable area: 108 to 404 (296px)

    Stroke: 20px, Gap: 32px, Step: 52px

    Layer 1 (outer): 108 to 404
    Layer 2:         160 to 352
    Layer 3:         212 to 300
    Center:          256

    Entry gap at top-right between Layer3_right (300) and Layer2_right (352).
  -->

  <rect width="512" height="512" rx="108" ry="108" fill="#0a0a0a"/>

  <path
    d="
      M 300,108
      L 108,108
      L 108,404
      L 404,404
      L 404,108
      L 352,108

      L 352,352
      L 160,352
      L 160,160
      L 300,160

      L 300,300
      L 212,300
      L 212,212
      L 256,212
    "
    fill="none"
    stroke="#10B981"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
