<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Square spiral labyrinth — large tier (4 layers), white on dark
    For 256px+ renders.
  -->

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <linearGradient id="stroke-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    </filter>

    <radialGradient id="specular" cx="0.3" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg-grad)"/>

  <path
    d="
      M 320,108
      L 108,108 L 108,404 L 404,404 L 404,108 L 362,108
      L 362,362 L 150,362 L 150,150 L 320,150
      L 320,320 L 192,320 L 192,192 L 278,192
      L 278,278 L 234,278 L 234,234 L 256,234
    "
    fill="none"
    stroke="#ffffff"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.2"
    filter="url(#glow)"
  />

  <path
    d="
      M 320,108
      L 108,108 L 108,404 L 404,404 L 404,108 L 362,108
      L 362,362 L 150,362 L 150,150 L 320,150
      L 320,320 L 192,320 L 192,192 L 278,192
      L 278,278 L 234,278 L 234,234 L 256,234
    "
    fill="none"
    stroke="url(#stroke-grad)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <rect width="512" height="512" rx="108" ry="108" fill="url(#specular)"/>
</svg>
