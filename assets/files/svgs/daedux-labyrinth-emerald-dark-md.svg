<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Daedalus Maze — medium tier (2 rings + center node)
    For 64-128px renders (Dock size).
    BOLD: thick strokes, bright colors, tinted background.
  -->

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f17"/>
      <stop offset="100%" stop-color="#060f0a"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <linearGradient id="border-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d2a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d1f15" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="510" height="510" rx="107" ry="107"
    fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- Glow -->
  <path d="M 232,108 L 108,108 L 108,404 L 404,404 L 404,108 L 280,108"
    fill="none" stroke="#10B981" stroke-width="32"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.3" filter="url(#glow)"/>
  <path d="M 352,232 L 352,160 L 160,160 L 160,352 L 352,352 L 352,280"
    fill="none" stroke="#34D399" stroke-width="32"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#6EE7B7" opacity="0.35" filter="url(#glow)"/>

  <!-- Ring 1 — brand emerald, gap NORTH -->
  <path d="M 232,108 L 108,108 L 108,404 L 404,404 L 404,108 L 280,108"
    fill="none" stroke="#10B981" stroke-width="26"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ring 2 — bright emerald, gap EAST -->
  <path d="M 352,232 L 352,160 L 160,160 L 160,352 L 352,352 L 352,280"
    fill="none" stroke="#34D399" stroke-width="26"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center node -->
  <circle cx="256" cy="256" r="20" fill="#A7F3D0"/>
</svg>
