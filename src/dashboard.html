// ─── Theme Management ───────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved && saved !== 'auto') {
    document.documentElement.dataset.theme = saved;
  }
}
initTheme();

function toggleTheme() {
  const current = document.documentElement.dataset.theme || 'auto';
  let next;
  if (current === 'auto' || !current) {
    // Detect current system preference and go opposite
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    next = isDark ? 'light' : 'dark';
  } else if (current === 'light') {
    next = 'dark';
  } else {
    // Remove override, return to auto
    delete document.documentElement.dataset.theme;
    localStorage.removeItem('theme');
    updateThemeIcon();
    return;
  }
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const icon = document.getElementById('themeIcon');
  if (!icon) return;
  const theme = document.documentElement.dataset.theme;
  const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
  // Sun icon for dark mode (click to go light), moon for light mode
  if (isDark) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  }
}

class MasonryLayout {
  constructor(container, options = {}) {
    this.container = typeof container === 'string'
      ? document.querySelector(container)
      : container;

  layout() {}
  refresh() {}

}

// ─── URL State Helpers ─────────────────────────────────────────────────────────
function getUrlState() {
  const params = new URLSearchParams(window.location.search);
  return {
    filter: params.get('filter') || 'all',
    sortKey: params.get('sort') || 'cost',
    sortDir: params.get('dir') || 'desc',
    search: params.get('q') || '',
    page: parseInt(params.get('page'), 10) || 1,
    project: params.get('project') || 'all'
  };
}

function updateUrlState() {
  const params = new URLSearchParams();
  if (currentFilter !== 'all') params.set('filter', currentFilter);
  if (currentProject !== 'all') params.set('project', currentProject);
  if (currentSort.key !== 'cost') params.set('sort', currentSort.key);
  if (currentSort.dir !== 'desc') params.set('dir', currentSort.dir);
  if (searchQuery) params.set('q', searchQuery);
  if (currentPage > 1) params.set('page', currentPage);

  const url = params.toString() ? `?${params.toString()}` : window.location.pathname;
  history.replaceState(null, '', url);
}

function goToPage(page) {
  currentPage = page;
  updateUrlState();
  renderSessions(getFilteredData());
}

// ─── Data Fetching ─────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    // Build URL with filter parameter for server-side date filtering
    const params = new URLSearchParams();
    if (currentFilter !== 'all') params.set('filter', currentFilter);
    const url = '/api/data' + (params.toString() ? '?' + params.toString() : '');

    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    render();
    // Trigger lazy loading of analytics after initial render
    loadAnalyticsInBackground();
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="loading">
        <div style="color: var(--red); font-size: 1.2rem; margin-bottom: 8px;">Failed to load data</div>
        <div class="loading-text">${escapeHtml(err.message)}</div>
        <button class="btn-refresh" style="margin-top: 16px;" onclick="fetchData()">Retry</button>
      </div>
    `;
  }
}

// ─── Lazy Loading Analytics ─────────────────────────────────────────────────────
// Load analytics data in background after initial render

function getAnalyticsUrl(endpoint) {
  const params = new URLSearchParams();
  if (currentFilter !== 'all') params.set('filter', currentFilter);
  if (currentProject !== 'all') params.set('project', currentProject);
  return `/api/analytics/${endpoint}` + (params.toString() ? '?' + params.toString() : '');
}

async function loadAnalyticsInBackground() {
  // Reset loaded state when fetching new data
  analyticsLoaded.models = false;
  analyticsLoaded.tools = false;
  analyticsLoaded.files = false;
  analyticsLoaded.context = false;
  analyticsLoaded.stats = false;

  // Load all analytics in parallel
  await Promise.all([
    loadModelsAnalytics(),
    loadToolsAnalytics(),
    loadFilesAnalytics(),
    loadContextAnalytics(),
    loadStatsAnalytics(),
  ]);
}

async function loadStatsAnalytics() {
  try {
    const resp = await fetch(getAnalyticsUrl('stats').replace('/analytics/', '/'));
    if (!resp.ok) return;
    STATS = await resp.json();
    analyticsLoaded.stats = true;
    // Re-render affected sections with consistent backend data
    const filteredData = getFilteredData();
    renderContextDisplacement(filteredData);
    // Could also re-render header stats here if we want to fix session count
  } catch (e) { console.warn('Failed to load stats analytics:', e); }
}

async function loadModelsAnalytics() {
  try {
    const resp = await fetch(getAnalyticsUrl('models'));

    const data = await resp.json();

    if (DATA) {
      DATA.modelBreakdown = data.modelBreakdown || [];
      DATA.topPrompts = data.topPrompts || [];

}

async function refreshData() {
  const refreshBtn = document.querySelector('.btn-refresh');
  const scrollY = window.scrollY;

  // Show inline spinner
  if (refreshBtn) {
    refreshBtn.classList.add('loading');
  }

  // Show toast notification
  const toast = document.createElement('div');
  toast.className = 'refresh-toast';
  toast.innerHTML = '<div class="spinner"></div>Re-parsing session files...';
  document.body.appendChild(toast);

  try {
    await fetch('/api/refresh');
    await fetchData();
    // Restore scroll position
    window.scrollTo(0, scrollY);
  } finally {
    // Clean up toast
    if (toast.parentNode) toast.parentNode.removeChild(toast);
    // Reset button
    if (refreshBtn) {
      refreshBtn.classList.remove('loading');
    }
  }
}

// ─── Keyboard Handler for Interactive Elements ────────────────────────────────
function handleKeyboardActivation(event) {

    event.preventDefault();
    event.target.click();
  }
}

// ─── Filtering ─────────────────────────────────────────────────────────────────
function getFilteredData() {
  if (!DATA) return null;

  // Date filtering is now handled server-side via /api/data?filter=today|7d|30d
  // Only project filtering is done client-side
  if (currentProject === 'all') {
    return DATA;
  }

  // Filter sessions by project
  const sessions = DATA.sessions.filter(s => s.project === currentProject);
  if (sessions.length === DATA.sessions.length) return DATA;

  return reAggregate(sessions);
}

function getUniqueProjects() {
  if (!DATA) return [];
  const projects = new Set(DATA.sessions.map(s => s.project));
  return Array.from(projects).sort((a, b) =>
    projectShort(a).localeCompare(projectShort(b))
  );
}

function getProjectsWithActivity() {
  if (!DATA) return [];

  // Aggregate stats per project
  const projectStats = {};
  for (const s of DATA.sessions) {
    if (!projectStats[s.project]) {
      projectStats[s.project] = {
        project: s.project,
        sessionCount: 0,
        queryCount: 0,
        totalCost: 0,
        mostRecentDate: ''
      };
    }
    const stats = projectStats[s.project];
    stats.sessionCount++;
    stats.queryCount += s.queryCount || 0;
    stats.totalCost += s.totalCost || 0;
    if (s.date && s.date > stats.mostRecentDate) {
      stats.mostRecentDate = s.date;
    }
  }

  // Convert to array and sort by session count (desc), then by most recent date (desc)
  const projects = Object.values(projectStats).sort((a, b) => {
    if (b.sessionCount !== a.sessionCount) return b.sessionCount - a.sessionCount;
    return b.mostRecentDate.localeCompare(a.mostRecentDate);
  });

  // Calculate percentile thresholds for activity level
  const sessionCounts = projects.map(p => p.sessionCount).sort((a, b) => a - b);
  const highThreshold = sessionCounts[Math.floor(sessionCounts.length * 0.6)] || 1;
  const mediumThreshold = sessionCounts[Math.floor(sessionCounts.length * 0.3)] || 1;

  // Assign activity level based on percentile
  return projects.map(p => ({
    ...p,
    displayName: projectShort(p.project),
    activityLevel: p.sessionCount >= highThreshold ? 'high' :
                   p.sessionCount >= mediumThreshold ? 'medium' : 'low'
  }));
}

function reAggregate(sessions) {
  // Recalculate totals
  const totalTokens = sessions.reduce((a, s) => a + s.totalTokens, 0);
  const totalCost = sessions.reduce((a, s) => a + s.totalCost, 0);
  const totalSaved = sessions.reduce((a, s) => a + s.savedByCaching, 0);
  const totalQueries = sessions.reduce((a, s) => a + s.queryCount, 0);
  const mainSessions = sessions.filter(s => !s.isSubagent);
  const subagentSessions = sessions.filter(s => s.isSubagent);
  const uncachedInput = sessions.reduce((a, s) => a + s.uncachedInput, 0);
  const cacheCreation = sessions.reduce((a, s) => a + s.cacheCreation, 0);
  const cacheRead = sessions.reduce((a, s) => a + s.cacheRead, 0);
  const output = sessions.reduce((a, s) => a + s.output, 0);
  const totalDuration = sessions.reduce((a, s) => a + s.durationMs, 0);
  const sessionsWithDuration = sessions.filter(s => s.durationMs > 0).length;

  const dates = sessions.map(s => s.date).filter(Boolean).sort();

  // Daily usage
  const dailyMap = {};
  for (const s of sessions) {
    if (!s.date) continue;
    if (!dailyMap[s.date]) {
      dailyMap[s.date] = { date: s.date, uncachedInput: 0, cacheCreation: 0, cacheRead: 0, output: 0, totalTokens: 0, totalCost: 0, savedByCaching: 0, sessions: 0, queries: 0 };
    }
    const d = dailyMap[s.date];
    d.uncachedInput += s.uncachedInput; d.cacheCreation += s.cacheCreation;
    d.cacheRead += s.cacheRead; d.output += s.output;
    d.totalTokens += s.totalTokens; d.totalCost += s.totalCost;
    d.savedByCaching += s.savedByCaching; d.sessions++; d.queries += s.queryCount;
  }
  const dailyUsage = Object.values(dailyMap).sort((a, b) => a.date.localeCompare(b.date));

  // Model breakdown - aggregate by version-aware display name (e.g., "Opus 4.6")
  // This prevents duplicate entries for the same model family+version
  const modelMap = {};
  for (const s of sessions) {
    // Use version-aware name as aggregation key instead of full model ID
    const versionKey = modelShortName(s.model);
    if (!modelMap[versionKey]) {
      modelMap[versionKey] = {
        model: versionKey,
        modelShort: versionKey,
        modelFamily: modelClass(s.model),
        rawModelIds: new Set(),
        totalTokens: 0,
        totalCost: 0,
        queries: 0,
        sessions: 0
      };
    }
    modelMap[versionKey].rawModelIds.add(s.model);
    modelMap[versionKey].totalTokens += s.totalTokens;
    modelMap[versionKey].totalCost += s.totalCost;
    modelMap[versionKey].queries += s.queryCount || 0;
    modelMap[versionKey].sessions++;
  }
  // Convert Sets to arrays for consistent access
  const modelBreakdown = Object.values(modelMap).map(m => ({
    ...m,
    rawModelIds: Array.from(m.rawModelIds)
  })).sort((a, b) => b.totalCost - a.totalCost);

  // Tool usage
  const toolMap = {};
  for (const s of sessions) {
    for (const [tool, count] of Object.entries(s.toolCounts)) {
      if (!toolMap[tool]) toolMap[tool] = { name: tool, count: 0, sessions: new Set() };
      toolMap[tool].count += count;
      toolMap[tool].sessions.add(s.sessionId);
    }
  }
  const toolUsage = Object.values(toolMap).map(t => ({ name: t.name, count: t.count, sessions: t.sessions.size })).sort((a, b) => b.count - a.count);

  // ─── Use server data for analytics that don't have per-session detail arrays ─
  // Note: toolHealth, bashCommands, fileActivity, and fileExtensions are already
  // date-filtered server-side. For project filtering, we can't re-filter them
  // without per-session detail arrays, so we use the server data directly.
  // This is acceptable because project filtering is a secondary filter after date.

  // ─── Compute additional totals for the new metrics ───────────────────────────
  const totalToolUses = sessions.reduce((a, s) => a + (s.toolUseCount || 0), 0);
  const totalBashCommands = sessions.reduce((a, s) => a + (s.bashCommandCount || s.toolCounts?.Bash || 0), 0);
  const totalFileOperations = sessions.reduce((a, s) => a + (s.fileActivityDetails?.length || 0), 0);
  const totalFileEdits = sessions.reduce(
    (a, s) => a + ((s.fileActivityDetails || []).filter(op => op.tool === 'Edit').length),
    0
  );

  // ─── Compute ROI fields ─────────────────────────────────────────────────────
  const totalSkillInvocations = toolMap['Skill']?.count || 0;
  const totalAgentSpawns = toolMap['Task']?.count || 0;
  const costPerEdit = totalFileEdits > 0 ? totalCost / totalFileEdits : 0;
  const agentLeverageRatio = sessions.length > 0 ? subagentSessions.length / sessions.length : 0;
  const inputTokens = uncachedInput + cacheRead + cacheCreation;
  const promptEfficiencyRatio = inputTokens > 0 ? output / inputTokens : 0;

  // Context efficiency: based on cache utilization and session efficiency
  const cacheEfficiency = cacheCreation > 0 ? cacheRead / cacheCreation : 0;
  const cacheBonus = Math.min(cacheEfficiency / 10, 30);
  const avgSessionTurns = sessions.length > 0
    ? sessions.reduce((a, s) => a + (s.queryCount || 0), 0) / sessions.length
    : 0;
  const lengthPenalty = Math.max(0, (avgSessionTurns - 50) * 0.3);
  const contextEfficiencyScore = Math.max(0, Math.min(100, 70 + cacheBonus - lengthPenalty));
  const avgContextUtilization = Math.min(avgSessionTurns * 2, 100); // Simplified: scale turns to %

  return {
    sessions,
    dailyUsage,
    modelBreakdown,
    toolUsage,
    topPrompts: DATA.topPrompts, // Date filtering is now server-side
    totals: {
      totalSessions: mainSessions.length,
      totalSubagents: subagentSessions.length,
      totalQueries,
      totalTokens,
      uncachedInput, cacheCreation, cacheRead, output,
      totalCost, savedByCaching: totalSaved,
      avgCostPerSession: mainSessions.length > 0 ? totalCost / mainSessions.length : 0,
      avgCostPerQuery: totalQueries > 0 ? totalCost / totalQueries : 0,
      cacheEfficiencyRatio: inputTokens > 0 ? cacheRead / inputTokens : 0,
      outputRatio: totalTokens > 0 ? output / totalTokens : 0,
      avgSessionDurationMs: sessionsWithDuration > 0 ? totalDuration / sessionsWithDuration : 0,
      dateRange: { from: dates[0] || '', to: dates[dates.length - 1] || '' },
      // Include totals from server data (date-filtered server-side)
      totalToolErrors: DATA.totals.totalToolErrors || 0,
      toolErrorRate: totalToolUses > 0 ? (DATA.totals.totalToolErrors || 0) / totalToolUses : 0,
      totalBashCommands,
      totalFileOperations,
      // ROI fields
      cacheSavingsUsd: totalSaved,
      costPerEdit,
      contextEfficiencyScore,
      avgContextUtilization,
      agentLeverageRatio,
      promptEfficiencyRatio,
      totalSkillInvocations,
      totalAgentSpawns,
    },
    insights: filterInsights(DATA.insights, sessions),
    // Use server data directly (date-filtered server-side; project filtering not supported)
    toolHealth: DATA.toolHealth,
    bashCommands: DATA.bashCommands,
    fileActivity: DATA.fileActivity,
    fileExtensions: DATA.fileExtensions,
    // Context analytics (date-filtered server-side; project filtering not supported)
    contextHeatmap: DATA.contextHeatmap,
    cacheEfficiencyCurve: DATA.cacheEfficiencyCurve,
    compactionAnalysis: DATA.compactionAnalysis,
    contextWindowFill: DATA.contextWindowFill,
    peakContextDistribution: DATA.peakContextDistribution,
    // Lazy-loaded analytics (date-filtered server-side; project filtering not supported)
    agentStats: DATA.agentStats,
    commandStats: DATA.commandStats,
    hookStats: DATA.hookStats,
    apiErrors: DATA.apiErrors,
    skillROI: DATA.skillROI,
    // Story-driven analytics
    efficiencyScore: DATA.efficiencyScore,
    weeklyComparison: DATA.weeklyComparison,
    agentROI: DATA.agentROI,
    toolHealthReportCard: DATA.toolHealthReportCard,
  };
}

// ─── Filter Insights Based on Filtered Sessions ────────────────────────────────
// Note: Date filtering is now handled server-side. This function only handles
// project filtering (matching insights to sessions in the selected project).
function filterInsights(insights, filteredSessions) {
  if (!insights || insights.length === 0) return [];
  // If no project filter applied, return all insights (already date-filtered by server)
  if (currentProject === 'all') return insights;

  // Build a set of session IDs and dates in the filtered (project) data
  const sessionIds = new Set(filteredSessions.map(s => s.sessionId));
  const dates = new Set(filteredSessions.map(s => s.date));

  return insights.filter(insight => {
    // If insight has session metadata, check if session is in filtered set
    if (insight.sessionId && !sessionIds.has(insight.sessionId)) return false;
    // If insight references a specific date, check if it's in the filtered range
    if (insight.date && !dates.has(insight.date)) return false;
    return true;
  });
}

// ─── Formatting ────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null || Number.isNaN(n)) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e4) return Math.round(n / 1e3) + 'K';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtDollars(n) {
  if (n == null || Number.isNaN(n)) return '$0.00';
  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  if (abs >= 1000) return sign + '$' + Math.round(abs).toLocaleString();
  if (abs >= 100) return sign + '$' + abs.toFixed(0);
  if (abs >= 1) return sign + '$' + abs.toFixed(2);
  if (abs >= 0.01) return sign + '$' + abs.toFixed(3);
  return sign + '$' + abs.toFixed(4);
}

function fmtDuration(ms) {
  const m = Math.round(ms / 60000);
  if (m < 1) return '<1m';
  if (m < 60) return m + 'm';
  return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
}

// Viridis-inspired color scale (perceptually uniform, colorblind-friendly)
// t should be 0-1, returns an RGB string
function viridisColor(t) {
  // Simplified viridis colormap control points
  const colors = [
    [68, 1, 84],      // 0.0 - dark purple
    [59, 82, 139],    // 0.25 - blue-purple
    [33, 145, 140],   // 0.5 - teal
    [94, 201, 98],    // 0.75 - green
    [253, 231, 37]    // 1.0 - yellow
  ];

  t = Math.max(0, Math.min(1, t));
  const idx = t * (colors.length - 1);
  const lower = Math.floor(idx);
  const upper = Math.ceil(idx);
  const frac = idx - lower;

  const c1 = colors[lower];
  const c2 = colors[upper];
  const r = Math.round(c1[0] + (c2[0] - c1[0]) * frac);
  const g = Math.round(c1[1] + (c2[1] - c1[1]) * frac);
  const b = Math.round(c1[2] + (c2[2] - c1[2]) * frac);

  return `rgb(${r}, ${g}, ${b})`;
}

function fmtCacheRatio(ratio) {
  // Format as multiplier (e.g., "2.5x" means 2.5 cached tokens per uncached token)
  if (ratio == null || Number.isNaN(ratio)) return '0x';
  if (ratio === 0) return '0x';
  if (ratio >= 10) return Math.round(ratio) + 'x';
  return ratio.toFixed(1) + 'x';
}

function fmtPct(n, decimals = 0) {
  if (n == null || Number.isNaN(n)) return '0%';
  return n.toFixed(decimals) + '%';
}

function formatDate(d) {
  if (!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = d.split('-');
  return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]);
}

function modelShortName(m) {
  if (!m) return 'Unknown';
  const l = m.toLowerCase();
  if (l.includes('opus')) {
    if (l.includes('4-6') || l.includes('4.6')) return 'Opus 4.6';
    if (l.includes('4-5') || l.includes('4.5')) return 'Opus 4.5';
    return 'Opus';
  }
  if (l.includes('sonnet')) {
    if (l.includes('4-6') || l.includes('4.6')) return 'Sonnet 4.6';
    if (l.includes('4-5') || l.includes('4.5')) return 'Sonnet 4.5';
    if (l.includes('3-5') || l.includes('3.5')) return 'Sonnet 3.5';
    return 'Sonnet';
  }
  if (l.includes('haiku')) {
    if (l.includes('4-5') || l.includes('4.5')) return 'Haiku 4.5';
    if (l.includes('3-5') || l.includes('3.5')) return 'Haiku 3.5';
    return 'Haiku';
  }
  return m;
}

function modelClass(m) {
  if (!m) return '';
  const l = m.toLowerCase();
  if (l.includes('opus')) return 'opus';
  if (l.includes('sonnet')) return 'sonnet';
  if (l.includes('haiku')) return 'haiku';
  return '';
}

// Extract date stamp from model ID, e.g., "claude-opus-4-6-20260210" → "2026-02-10"
function extractModelDate(modelId) {
  const match = modelId.match(/(\d{4})(\d{2})(\d{2})$/);
  if (match) {
    return `${match[1]}-${match[2]}-${match[3]}`;
  }
  return null;
}

function toolNameShort(name) {
  // MCP tools: mcp__plugin_grepika_grepika__search → grepika/search
  if (name.startsWith('mcp__')) {
    const parts = name.replace('mcp__', '').split('__');
    if (parts.length >= 2) {
      const plugin = parts[0].replace('plugin_', '').replace(/_/g, '-');
      const action = parts[parts.length - 1];
      return `${plugin}/${action}`;
    }
    return parts.join('/');
  }
  return name;
}

function projectShort(p) {
  // Convert dash-separated path to slash-separated
  let path = p.replace(/-/g, '/');

  // Split into segments and remove empty parts
  const segments = path.split('/').filter(s => s && s.length > 0);

  // Filter out common path prefixes
  const skipPatterns = ['users', 'home', 'documents', 'projects', 'git', 'code', 'src', 'dev', 'work', 'repos', 'github'];
  let startIdx = 0;

  for (let i = 0; i < segments.length - 1; i++) {
    const seg = segments[i].toLowerCase();
    // Skip drive letters (single letters) and common path prefixes
    if (seg.length === 1 || skipPatterns.includes(seg)) {
      startIdx = i + 1;
    } else {
      break;
    }
  }

  // Take last 2 meaningful segments for concise display
  const meaningfulSegments = segments.slice(startIdx);

  if (meaningfulSegments.length === 0) return segments.slice(-2).join('/') || p;
  if (meaningfulSegments.length <= 2) return meaningfulSegments.join('/');

  // For 3+ segments: show only the last 2 for clean, readable labels
  return meaningfulSegments.slice(-2).join('/');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ─── Project Dropdown ───────────────────────────────────────────────────────────
function initProjectDropdown() {
  const dropdown = document.getElementById('projectDropdown');
  const trigger = document.getElementById('projectDropdownTrigger');
  const menu = document.getElementById('projectDropdownMenu');

  if (!dropdown || !trigger || !menu) return;

  const options = menu.querySelectorAll('.project-dropdown-option');
  let focusedIndex = -1;

  function openDropdown() {
    trigger.setAttribute('aria-expanded', 'true');
    menu.classList.add('open');
    // Focus first selected item or first item
    const selectedIndex = Array.from(options).findIndex(o => o.classList.contains('selected'));
    focusedIndex = selectedIndex >= 0 ? selectedIndex : 0;
    updateFocus();
  }

  function closeDropdown() {
    trigger.setAttribute('aria-expanded', 'false');
    menu.classList.remove('open');
    focusedIndex = -1;
    options.forEach(o => o.classList.remove('focused'));
  }

  function updateFocus() {
    options.forEach((o, i) => {
      o.classList.toggle('focused', i === focusedIndex);
      if (i === focusedIndex) {
        o.scrollIntoView({ block: 'nearest' });
        trigger.setAttribute('aria-activedescendant', o.dataset.value);
      }
    });
  }

  function selectOption(value) {
    currentProject = value;
    currentPage = 1;
    updateUrlState();
    closeDropdown();
    const app = document.getElementById('app');
    app.classList.add('loading-content');
    requestAnimationFrame(() => {
      render();
      app.classList.remove('loading-content');
    });
    // Reload context analytics with project filter (server-side filtering)
    loadContextAnalytics();
  }

  // Toggle dropdown on trigger click
  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = trigger.getAttribute('aria-expanded') === 'true';
    if (isOpen) {
      closeDropdown();
    } else {
      openDropdown();
    }
  });

  // Handle option clicks
  options.forEach(option => {
    option.addEventListener('click', (e) => {
      e.stopPropagation();
      selectOption(option.dataset.value);
    });
  });

  // Keyboard navigation
  trigger.addEventListener('keydown', (e) => {
    const isOpen = trigger.getAttribute('aria-expanded') === 'true';

    switch (e.key) {
      case 'Enter':
      case ' ':
        e.preventDefault();
        if (isOpen && focusedIndex >= 0) {
          selectOption(options[focusedIndex].dataset.value);
        } else {
          openDropdown();
        }
        break;
      case 'Escape':
        if (isOpen) {
          e.preventDefault();
          closeDropdown();
          trigger.focus();
        }
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (!isOpen) {
          openDropdown();
        } else {
          focusedIndex = Math.min(focusedIndex + 1, options.length - 1);
          updateFocus();
        }
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (isOpen) {
          focusedIndex = Math.max(focusedIndex - 1, 0);
          updateFocus();
        }
        break;
      case 'Home':
        if (isOpen) {
          e.preventDefault();
          focusedIndex = 0;
          updateFocus();
        }
        break;
      case 'End':
        if (isOpen) {
          e.preventDefault();
          focusedIndex = options.length - 1;
          updateFocus();
        }
        break;
    }
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target)) {
      closeDropdown();
    }
  });
}

function getPeriodLabel() {
  switch (currentFilter) {
    case 'today': return 'yesterday';
    case '7d': return 'prev 7 days';
    case '30d': return 'prev 30 days';
    default: return 'prev period';
  }
}

function calcTrend(current, previous) {
  if (!previous || previous === 0) return { label: '', cls: 'neutral', title: '' };
  const pct = ((current - previous) / previous) * 100;
  const periodLabel = getPeriodLabel();
  // For cost metrics: increase is negative (bad), decrease is positive (good)
  return {
    label: `${pct > 0 ? '+' : ''}${pct.toFixed(0)}%`,
    cls: pct > 5 ? 'negative' : pct < -5 ? 'positive' : 'neutral',
    title: `Compared to ${periodLabel}`
  };
}

function calcTrendInverse(current, previous) {
  // For "good when higher" metrics like cache savings: increase is positive
  if (!previous || previous === 0) return { label: '', cls: 'neutral', title: '' };
  const pct = ((current - previous) / previous) * 100;
  const periodLabel = getPeriodLabel();
  return {
    label: `${pct > 0 ? '+' : ''}${pct.toFixed(0)}%`,
    cls: pct > 5 ? 'positive' : pct < -5 ? 'negative' : 'neutral',
    title: `Compared to ${periodLabel}`
  };
}

function formatLocalDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getPreviousPeriodTotals() {
  if (!DATA || currentFilter === 'all') return null;
  const now = new Date();
  let prevStart, prevEnd;

  if (currentFilter === 'today') {
    // Previous day
    const yesterday = new Date(now - 86400000);
    prevStart = prevEnd = formatLocalDate(yesterday);
  } else if (currentFilter === '7d') {
    // Previous 7 days (7-14 days ago)
    const end = new Date(now - 7 * 86400000);
    const start = new Date(now - 14 * 86400000);
    prevStart = formatLocalDate(start);
    prevEnd = formatLocalDate(end);
  } else if (currentFilter === '30d') {
    // Previous 30 days (30-60 days ago)
    const end = new Date(now - 30 * 86400000);
    const start = new Date(now - 60 * 86400000);
    prevStart = formatLocalDate(start);
    prevEnd = formatLocalDate(end);
  }

  if (!prevStart) return null;
  // Use <= for end comparison to include single-day periods (when prevStart === prevEnd)
  const filtered = DATA.sessions.filter(s => s.date >= prevStart && s.date <= prevEnd);
  if (filtered.length === 0) return null;
  return reAggregate(filtered).totals;
}

// ─── Cost Sparkline ─────────────────────────────────────────────────────────────
function renderCostSparkline(data) {
  const canvas = document.getElementById('costSparkline');
  if (!canvas || !data.dailyUsage || data.dailyUsage.length < 2) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = 40;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const costs = data.dailyUsage.map(d => d.totalCost);
  const maxCost = Math.max(...costs) * 1.1 || 1;
  const minCost = Math.min(...costs) * 0.9;
  const range = maxCost - minCost || 1;
  const stepX = W / (costs.length - 1 || 1);

  // Draw fill gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  gradient.addColorStop(0, accent + '40');
  gradient.addColorStop(1, accent + '00');

  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < costs.length; i++) {
    const x = i * stepX;
    const y = H - ((costs[i] - minCost) / range) * (H - 4) - 2;
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Draw line
  ctx.beginPath();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  for (let i = 0; i < costs.length; i++) {
    const x = i * stepX;
    const y = H - ((costs[i] - minCost) / range) * (H - 4) - 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Draw endpoint dot
  const lastX = (costs.length - 1) * stepX;
  const lastY = H - ((costs[costs.length - 1] - minCost) / range) * (H - 4) - 2;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
  ctx.fillStyle = accent;
  ctx.fill();
}

// ─── Efficiency Panel ──────────────────────────────────────────────────────────
function getScoreClass(score) {
  if (score >= 80) return 'excellent';
  if (score >= 60) return 'good';
  if (score >= 40) return 'needs-work';
  return 'poor';
}

function renderEfficiencyPanel(data) {
  const panel = document.getElementById('efficiencyPanel');
  if (!data.efficiencyScore) {
    panel.innerHTML = '';
    return;
  }

  const eff = data.efficiencyScore;
  const t = data.totals;
  const trendIcon = {
    improving: '↑',
    declining: '↓',
    stable: '→'
  }[eff.trend] || '→';

  const overallClass = getScoreClass(eff.overall);
  const cacheClass = getScoreClass(eff.cacheEfficiency);
  const toolClass = getScoreClass(eff.toolSuccess);
  const sessionClass = getScoreClass(eff.sessionEfficiency);

  // Generate narrative headline with cache savings context
  const cacheSavings = t.savedByCaching || 0;
  const cacheRatio = t.cacheEfficiencyRatio || 0;
  let headline = '';
  let subheadline = '';

  if (eff.overall >= 80) {
    headline = `Your workflow efficiency is <strong class="score-excellent">excellent</strong>`;
    subheadline = `Cache saved you <strong>${fmtDollars(cacheSavings)}</strong> this period (${fmtCacheRatio(cacheRatio)} leverage). You're in the top tier of efficiency.`;
  } else if (eff.overall >= 60) {
    headline = `Your workflow efficiency is <strong class="score-good">good</strong>`;
    subheadline = `Cache saved you <strong>${fmtDollars(cacheSavings)}</strong> this period. There's room to optimize further.`;
  } else if (eff.overall >= 40) {
    headline = `Your workflow efficiency <strong class="score-needs-work">needs attention</strong>`;
    subheadline = cacheSavings > 0
      ? `Cache saved ${fmtDollars(cacheSavings)}, but you could save more with longer sessions and better tool patterns.`
      : `Low cache utilization is increasing your costs. Consider using longer sessions.`;
  } else {
    headline = `Your workflow efficiency is <strong class="score-poor">below average</strong>`;
    subheadline = `Focus on improving cache hits and reducing tool errors to lower costs significantly.`;
  }

  // Determine primary action based on weakest area
  let primaryAction = '';
  const weakestScore = Math.min(eff.cacheEfficiency, eff.toolSuccess, eff.sessionEfficiency);
  if (weakestScore === eff.cacheEfficiency && eff.cacheEfficiency < 70) {
    primaryAction = 'Improve cache efficiency by using longer sessions and avoiding frequent restarts.';
  } else if (weakestScore === eff.toolSuccess && eff.toolSuccess < 90) {
    primaryAction = 'Reduce tool errors by checking file paths and command syntax before running.';
  } else if (weakestScore === eff.sessionEfficiency && eff.sessionEfficiency < 70) {
    primaryAction = 'Sessions with 30-60 turns tend to be most cost-effective.';
  }

  panel.innerHTML = `
    <div class="efficiency-narrative">
      <div class="efficiency-headline">${headline}</div>
      <div class="efficiency-subheadline">${subheadline}</div>
    </div>
    <div class="efficiency-metrics">
      <div class="efficiency-metric">
        <div class="efficiency-metric-value ${overallClass}">${eff.overall}
          <span class="efficiency-trend ${eff.trend}">${trendIcon}</span>
        </div>
        <div class="efficiency-metric-label">Overall Score</div>
      </div>
      <div class="efficiency-metric">
        <div class="efficiency-metric-value ${cacheClass}">${eff.cacheEfficiency}%</div>
        <div class="efficiency-metric-label">Cache Efficiency</div>
      </div>
      <div class="efficiency-metric">
        <div class="efficiency-metric-value ${toolClass}">${eff.toolSuccess}%</div>
        <div class="efficiency-metric-label">Tool Success</div>
      </div>
      <div class="efficiency-metric">
        <div class="efficiency-metric-value ${sessionClass}">${eff.sessionEfficiency}%</div>
        <div class="efficiency-metric-label">Session Efficiency</div>
      </div>
    </div>
    ${primaryAction || eff.topOpportunity ? `

      <div class="efficiency-opportunity-text">${escapeHtml(primaryAction || eff.topOpportunity)}</div>

}

// ─── Collapsible Sections ───────────────────────────────────────────────────────
function toggleCollapsible(sectionId) {
  const section = document.getElementById(sectionId);
  if (!section) return;

  const isExpanded = section.classList.contains('expanded');
  section.classList.toggle('expanded');

  // Use :scope to only select direct child header, not nested ones
  const header = section.querySelector(':scope > .collapsible-header');
  if (header) {
    header.setAttribute('aria-expanded', !isExpanded);
  }

  // Use :scope to only select direct child toggle text
  const toggleText = section.querySelector(':scope > .collapsible-header .toggle-text');
  if (toggleText) {
    const isDeepDive = sectionId === 'deepDiveSection';
    toggleText.textContent = isExpanded
      ? (isDeepDive ? 'Show charts' : 'Show details')
      : (isDeepDive ? 'Hide charts' : 'Hide details');
  }

  // Trigger masonry relayout after expand
  if (!isExpanded) {
    setTimeout(() => {
      const masonryId = sectionId.replace('Section', 'Masonry');
      if (chartsMasonryInstances[masonryId]) {
        chartsMasonryInstances[masonryId].refresh();
      }
    }, 250);
  }
}

      <span class="collapsible-preview-value">${cacheEff?.toFixed(0) ?? '—'}%</span>
    </span>
    <span class="collapsible-preview-item">
      <span>Agents:</span>
      <span class="collapsible-preview-value">${agentCount}</span>
    </span>
    <span class="collapsible-preview-item">
      <span>Skills:</span>
      <span class="collapsible-preview-value">${skillCount}</span>
    </span>
  `;
}

function renderInsights(data) {
  const grid = document.getElementById('insightsGrid');
  if (!data.insights || data.insights.length === 0) {
    grid.innerHTML = '<div style="color: var(--text-muted); font-size: 0.8rem;">No insights to display.</div>';
    // Destroy existing masonry if no insights
    if (insightsMasonry) {
      insightsMasonry.destroy();
      insightsMasonry = null;
    }
    return;
  }

  // Sort by priority (lower = higher priority), then by type
  const typeOrder = { warning: 0, success: 1, info: 2, tip: 3, neutral: 4 };
  const sorted = [...data.insights].sort((a, b) => {
    // Primary sort by priority if available
    const aPriority = a.priority ?? 5;
    const bPriority = b.priority ?? 5;
    if (aPriority !== bPriority) return aPriority - bPriority;
    // Secondary sort by type
    return (typeOrder[a.type] ?? 5) - (typeOrder[b.type] ?? 5);
  });

  grid.innerHTML = sorted.map(ins => {
    // Handle both old 'description' and new 'message' field names
    const message = ins.message || ins.description || '';
    const action = ins.action || '';

    // Build comparison HTML if present
    let comparisonHtml = '';
    if (ins.comparison) {
      const c = ins.comparison;
      const changeText = c.changePercent !== undefined
        ? `${c.changePercent > 0 ? '+' : ''}${c.changePercent.toFixed(0)}%`
        : '';
      // Determine if direction is good or bad based on context
      // For costs: down is good, up is bad
      // For efficiency: up is good, down is bad
      let changeClass = c.direction || 'flat';
      if (ins.type === 'success' && c.direction === 'down') {
        changeClass = 'down-good';
      } else if (ins.type === 'warning' && c.direction === 'up') {
        changeClass = 'up-bad';
      }
      comparisonHtml = `
        <div class="insight-comparison">
          <span class="insight-comparison-label">This week:</span>
          <span class="insight-comparison-value">${fmt(c.thisWeek)}</span>
          <span class="insight-comparison-label">vs last:</span>
          <span class="insight-comparison-value">${fmt(c.lastWeek)}</span>
          <span class="insight-comparison-change ${changeClass}">${changeText}</span>
        </div>
      `;
    }

    // Build action buttons based on insight category
    let actionButtons = '';
    if (ins.type === 'warning' && ins.category) {
      const buttons = [];
      if (ins.category === 'tool-errors' || ins.category === 'bash-errors') {
        buttons.push(`<button class="insight-btn" onclick="event.stopPropagation(); filterSessionsByError()">View Error Sessions</button>`);
      }
      if (ins.category === 'cost' || ins.category === 'high-cost') {
        buttons.push(`<button class="insight-btn" onclick="event.stopPropagation(); scrollToSection('costAnalysisMasonry')">See Cost Breakdown</button>`);
      }
      if (ins.category === 'cache' || ins.category === 'low-cache') {
        buttons.push(`<button class="insight-btn" onclick="event.stopPropagation(); scrollToSection('efficiencyMasonry')">View Cache Details</button>`);
      }
      if (buttons.length > 0) {
        actionButtons = `<div class="insight-buttons">${buttons.join('')}</div>`;
      }
    } else if (ins.type === 'tip' && ins.category) {
      if (ins.category === 'agent' || ins.category === 'skill') {
        actionButtons = `<div class="insight-buttons"><button class="insight-btn" onclick="event.stopPropagation(); expandAndScrollTo('advancedAnalyticsSection')">Explore Skills & Agents</button></div>`;
      }
    }

    return `
      <div class="insight-card ${ins.type}" tabindex="0" role="button" aria-expanded="false" onclick="toggleInsightCard(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="insight-header">
          <div class="insight-title">${escapeHtml(ins.title)}</div>
          <span class="insight-badge">${ins.type}</span>
          <svg class="insight-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="insight-body">
          <div class="insight-body-inner">
            <div class="insight-desc">${escapeHtml(message)}</div>
            ${comparisonHtml}
            ${action ? `<div class="insight-action">${escapeHtml(action)}</div>` : ''}
            ${actionButtons}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Initialize or refresh masonry layout
  if (insightsMasonry) {
    insightsMasonry.refresh();
  } else {
    insightsMasonry = new MasonryLayout(grid, {
      itemSelector: '.masonry-item',
      animate: true
    });
  }
}

// ─── Charts Masonry ────────────────────────────────────────────────────────────
function initChartsMasonry() {
  const sectionIds = [
    'costAnalysisMasonry',
    'efficiencyMasonry',
    'toolAnalysisMasonry',
    'advancedAnalyticsMasonry'
  ];

  sectionIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    const existing = chartsMasonryInstances[id];

    // If DOM was replaced (re-render), destroy stale instance
    if (existing && existing.container !== el) {
      existing.destroy();
      chartsMasonryInstances[id] = null;
    }

    if (chartsMasonryInstances[id]) {
      chartsMasonryInstances[id].refresh();
    } else {
      chartsMasonryInstances[id] = new MasonryLayout(el, {
        itemSelector: '.masonry-item',
        animate: true
      });
    }
  });
}

// ─── Daily Chart ───────────────────────────────────────────────────────────────
function renderDailyChart(data) {
  const canvas = document.getElementById('dailyChart');
  if (!canvas || data.dailyUsage.length === 0) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const days = data.dailyUsage;
  const pad = { top: 20, right: 60, bottom: 30, left: 60 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Max tokens for left Y axis
  const maxTokens = Math.max(...days.map(d => d.totalTokens)) * 1.1 || 1;
  // Max cost for right Y axis
  const maxCost = Math.max(...days.map(d => d.totalCost)) * 1.1 || 1;

  const barW = Math.max(2, Math.min(20, (cw / days.length) * 0.7));
  const gap = cw / days.length;

  // Grid lines (left Y axis - tokens)
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  ctx.lineWidth = 0.5;
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  ctx.font = '10px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-mono').trim();
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.textAlign = 'right';
    ctx.fillText(fmt(maxTokens * i / 4), pad.left - 6, y + 3);
    // Right Y axis - cost
    ctx.textAlign = 'left';
    ctx.fillText(fmtDollars(maxCost * i / 4), W - pad.right + 6, y + 3);
  }

  // Stacked bars - colors and series keys
  const colors = {
    uncachedInput: getComputedStyle(document.documentElement).getPropertyValue('--red').trim(),
    cacheCreation: getComputedStyle(document.documentElement).getPropertyValue('--orange').trim(),
    cacheRead: getComputedStyle(document.documentElement).getPropertyValue('--green').trim(),
    output: getComputedStyle(document.documentElement).getPropertyValue('--blue').trim(),
  };

  for (let i = 0; i < days.length; i++) {
    const d = days[i];
    const x = pad.left + i * gap + (gap - barW) / 2;
    let y = pad.top + ch;

    const segments = [
      { key: 'output', val: d.output, color: colors.output },
      { key: 'cacheRead', val: d.cacheRead, color: colors.cacheRead },
      { key: 'cacheCreation', val: d.cacheCreation, color: colors.cacheCreation },
      { key: 'uncachedInput', val: d.uncachedInput, color: colors.uncachedInput },
    ];

    for (const seg of segments) {
      if (hiddenSeries.has(seg.key)) continue; // Skip hidden series
      const h = (seg.val / maxTokens) * ch;
      if (h < 0.5) continue;
      ctx.fillStyle = seg.color;
      ctx.fillRect(x, y - h, barW, h);
      y -= h;
    }
  }

  // Cost line overlay (if not hidden)
  if (!hiddenSeries.has('cost')) {
    ctx.beginPath();
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    ctx.lineWidth = 2;
    for (let i = 0; i < days.length; i++) {
      const x = pad.left + i * gap + gap / 2;
      const y = pad.top + ch - (days[i].totalCost / maxCost) * ch;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // X-axis labels with dynamic density
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  ctx.font = '9px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-mono').trim();
  ctx.textAlign = 'center';
  // Calculate optimal label count based on chart width (min 60px per label)
  const maxLabels = Math.max(4, Math.floor(cw / 70));
  const step = Math.max(1, Math.ceil(days.length / maxLabels));
  for (let i = 0; i < days.length; i += step) {
    const x = pad.left + i * gap + gap / 2;
    ctx.fillText(formatDate(days[i].date), x, H - 8);
  }
  // Always show last label if not already shown
  if ((days.length - 1) % step !== 0 && days.length > 1) {
    const x = pad.left + (days.length - 1) * gap + gap / 2;
    ctx.fillText(formatDate(days[days.length - 1].date), x, H - 8);
  }

  // Interactive Legend with toggle functionality
  const legendItems = [
    { key: 'uncachedInput', color: colors.uncachedInput, label: 'Uncached Input' },
    { key: 'cacheCreation', color: colors.cacheCreation, label: 'Cache Write' },
    { key: 'cacheRead', color: colors.cacheRead, label: 'Cache Read' },
    { key: 'output', color: colors.output, label: 'Output' },
    { key: 'cost', color: 'var(--accent)', label: 'Cost ($)', dot: 'border-radius:50%' },
  ];
  document.getElementById('dailyLegend').innerHTML = legendItems.map(item => `
    <button class="legend-item" role="switch" aria-pressed="${!hiddenSeries.has(item.key)}" data-series="${item.key}" title="Click to ${hiddenSeries.has(item.key) ? 'show' : 'hide'} ${item.label}">
      <div class="legend-dot" style="background:${item.color};${item.dot || ''}"></div>${item.label}
    </button>
  `).join('');

  // Attach legend toggle handlers
  document.querySelectorAll('#dailyLegend .legend-item').forEach(btn => {
    btn.onclick = () => {
      const series = btn.dataset.series;
      if (hiddenSeries.has(series)) hiddenSeries.delete(series);
      else hiddenSeries.add(series);
      renderDailyChart(data); // Re-render chart
    };
  });

  // Tooltip support
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const barIndex = Math.floor((x - pad.left) / gap);
    if (barIndex >= 0 && barIndex < days.length) {
      const d = days[barIndex];
      showChartTooltip(e, `
        <div class="chart-tooltip-title">${formatDate(d.date)}</div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Cost:</span><span class="chart-tooltip-value">${fmtDollars(d.totalCost)}</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Tokens:</span><span class="chart-tooltip-value">${fmt(d.totalTokens)}</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Sessions:</span><span class="chart-tooltip-value">${d.sessions}</span></div>
      `);
    } else {
      hideChartTooltip();
    }
  };
  canvas.onmouseleave = hideChartTooltip;

  // Populate screen reader description
  const dailyDesc = document.getElementById('dailyChartDesc');
  if (dailyDesc) {
    const totalCost = days.reduce((a, d) => a + d.totalCost, 0);
    const totalTokens = days.reduce((a, d) => a + d.totalTokens, 0);
    dailyDesc.textContent = `Daily usage chart showing ${days.length} days. Total cost: ${fmtDollars(totalCost)}. Total tokens: ${fmt(totalTokens)}. Most recent day (${formatDate(days[days.length - 1]?.date)}): ${fmtDollars(days[days.length - 1]?.totalCost || 0)}.`;
  }
}

// ─── Model Proportion Bar ──────────────────────────────────────────────────────
function renderModelChart(data) {
  const container = document.getElementById('modelChart');
  if (!container || data.modelBreakdown.length === 0) return;

  const totalCost = data.modelBreakdown.reduce((a, m) => a + m.totalCost, 0);
  if (totalCost === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem">No cost data</div>';
    return;
  }

  // Version-specific colors - distinguishes Opus 4.5 from 4.6, etc.
  const cs = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const modelColors = {
    'Opus 4.6': cs('--model-opus-46'),
    'Opus 4.5': cs('--model-opus-45'),
    'Opus': cs('--model-opus-45'),
    'Sonnet 4.6': cs('--model-sonnet-46'),
    'Sonnet 4.5': cs('--model-sonnet-45'),
    'Sonnet': cs('--model-sonnet-45'),
    'Haiku 4.5': cs('--model-haiku-45'),
    'Haiku 3.5': cs('--model-haiku-45'),
    'Haiku': cs('--model-haiku-45'),
  };
  const defaultColor = cs('--blue');
  const getModelColor = (modelShort) => modelColors[modelShort] || defaultColor;

  // Build proportion bar segments
  const segments = data.modelBreakdown.map(m => {
    const color = getModelColor(m.modelShort);
    const pct = (m.totalCost / totalCost) * 100;
    const showLabel = pct >= 15; // Only show inline label if segment is wide enough
    const smallClass = pct < 2 ? ' segment-small' : '';
    return `<div class="proportion-bar-segment${smallClass}"
      style="flex: ${pct}; background-color: ${color};"
      data-model="${escapeHtml(m.modelShort)}"
      data-cost="${m.totalCost}"
      data-tokens="${m.totalTokens}"
      data-queries="${m.queries}"
      data-pct="${pct.toFixed(1)}"
      title="${escapeHtml(m.modelShort)}: ${fmtDollars(m.totalCost)} (${pct.toFixed(0)}%)"
    >${showLabel ? escapeHtml(m.modelShort) : ''}</div>`;
  }).join('');

  // Build legend
  const legendItems = data.modelBreakdown.map(m => {
    const color = getModelColor(m.modelShort);
    const pct = totalCost > 0 ? ((m.totalCost / totalCost) * 100).toFixed(0) : '0';
    return `<div class="proportion-bar-legend-item">
      <div class="proportion-bar-legend-dot" style="background: ${color}"></div>
      <span>${escapeHtml(m.modelShort)}: ${fmtDollars(m.totalCost)} (${pct}%)</span>
    </div>`;
  }).join('');

  // Render the component
  container.innerHTML = `
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
      <span style="font-family: var(--font-data); font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">${fmtDollars(totalCost)}</span>
      <span style="font-size: 0.75rem; color: var(--text-muted);">total cost</span>
    </div>
    <div class="proportion-bar">${segments}</div>
    <div class="proportion-bar-legend">${legendItems}</div>
  `;

  // Add tooltip support to segments
  container.querySelectorAll('.proportion-bar-segment').forEach(seg => {
    seg.addEventListener('mouseenter', (e) => {
      const model = seg.dataset.model;
      const cost = parseFloat(seg.dataset.cost);
      const tokens = parseInt(seg.dataset.tokens);
      const queries = parseInt(seg.dataset.queries);
      const pct = seg.dataset.pct;
      showChartTooltip(e, `
        <div class="chart-tooltip-title">${escapeHtml(model)}</div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Cost:</span><span class="chart-tooltip-value">${fmtDollars(cost)}</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Share:</span><span class="chart-tooltip-value">${pct}%</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Tokens:</span><span class="chart-tooltip-value">${fmt(tokens)}</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Queries:</span><span class="chart-tooltip-value">${queries}</span></div>
      `);
    });
    seg.addEventListener('mouseleave', hideChartTooltip);
  });

  // Populate screen reader description
  const modelDesc = document.getElementById('modelChartDesc');
  if (modelDesc) {
    const breakdown = data.modelBreakdown.map(m => `${m.modelShort}: ${fmtDollars(m.totalCost)} (${totalCost > 0 ? ((m.totalCost / totalCost) * 100).toFixed(0) : 0}%)`).join(', ');
    modelDesc.textContent = `Model cost breakdown. Total: ${fmtDollars(totalCost)}. ${breakdown}.`;
  }
}

// ─── Project Chart ─────────────────────────────────────────────────────────────
function renderProjectChart(data) {
  const canvas = document.getElementById('projectChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;

  // Aggregate cost by project
  const projectCosts = {};
  for (const s of data.sessions) {
    projectCosts[s.project] = (projectCosts[s.project] || 0) + s.totalCost;
  }
  const projects = Object.entries(projectCosts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  if (projects.length === 0) return;

  const H = Math.max(120, projects.length * 28 + 40);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const pad = { left: 160, right: 70, top: 15, bottom: 15 };
  const maxCost = projects[0][1];
  const totalCost = projects.reduce((sum, [, c]) => sum + c, 0);
  const barH = 18;
  const gap = 28;

  ctx.font = '10px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-mono').trim();

  for (let i = 0; i < projects.length; i++) {
    const [proj, cost] = projects[i];
    const y = pad.top + i * gap;
    const barW = ((W - pad.left - pad.right) * cost) / maxCost;

    // Label
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
    ctx.textAlign = 'right';
    const label = projectShort(proj);
    ctx.fillText(label, pad.left - 8, y + barH / 2 + 3);

    // Bar
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    ctx.globalAlpha = 0.7 + (0.3 * (1 - i / projects.length));
    ctx.fillRect(pad.left, y, barW, barH);
    ctx.globalAlpha = 1;

    // Cost label with percentage
    const costPct = (cost / totalCost * 100).toFixed(0);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
    ctx.textAlign = 'left';
    ctx.fillText(`${fmtDollars(cost)} (${costPct}%)`, pad.left + barW + 8, y + barH / 2 + 3);
  }

  // Tooltip support for project chart - hover anywhere on row (label + bar area)
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height / dpr);
    for (let i = 0; i < projects.length; i++) {
      const y = pad.top + i * gap;
      const [proj, cost] = projects[i];
      const barW = ((W - pad.left - pad.right) * cost) / maxCost;
      // Expand hover area to include label + bar + cost label
      if (my >= y && my <= y + barH && mx >= 0 && mx <= pad.left + barW + 80) {
        const sessionCount = data.sessions.filter(s => s.project === proj).length;
        const costPct = (cost / totalCost * 100).toFixed(1);
        const avgCost = sessionCount > 0 ? cost / sessionCount : 0;
        showChartTooltip(e, `
          <div class="chart-tooltip-title">${escapeHtml(proj.replace(/-/g, '/'))}</div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Cost:</span><span class="chart-tooltip-value">${fmtDollars(cost)} (${costPct}%)</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Sessions:</span><span class="chart-tooltip-value">${sessionCount}</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Avg/session:</span><span class="chart-tooltip-value">${fmtDollars(avgCost)}</span></div>
        `);
        return;
      }
    }
    hideChartTooltip();
  };
  canvas.onmouseleave = hideChartTooltip;
}

// ─── Duration Distribution Bar ─────────────────────────────────────────────────
function renderDurationChart(data) {
  const container = document.getElementById('durationChart');
  if (!container) return;

  const sessionsWithDur = data.sessions.filter(s => s.durationMs > 0 && !s.isSubagent);
  const buckets = [
    { label: '<5m', min: 0, max: 5 * 60000, count: 0, cost: 0, color: getComputedStyle(document.documentElement).getPropertyValue('--green').trim() },
    { label: '5-30m', min: 5 * 60000, max: 30 * 60000, count: 0, cost: 0, color: getComputedStyle(document.documentElement).getPropertyValue('--blue').trim() },
    { label: '30-60m', min: 30 * 60000, max: 60 * 60000, count: 0, cost: 0, color: getComputedStyle(document.documentElement).getPropertyValue('--purple').trim() },
    { label: '>60m', min: 60 * 60000, max: Infinity, count: 0, cost: 0, color: getComputedStyle(document.documentElement).getPropertyValue('--orange').trim() },
  ];

  for (const s of sessionsWithDur) {
    for (const b of buckets) {
      if (s.durationMs >= b.min && s.durationMs < b.max) { b.count++; b.cost += s.totalCost; break; }
    }
  }

  const totalCount = buckets.reduce((a, b) => a + b.count, 0);
  if (totalCount === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem">No duration data</div>';
    return;
  }

  // Build distribution bar segments
  const segments = buckets.map(b => {
    const pct = (b.count / totalCount) * 100;
    const showLabel = pct >= 12;
    return `<div class="duration-segment"
      style="flex: ${Math.max(pct, 3)}; background: ${b.color};"
      data-label="${b.label}"
      data-count="${b.count}"
      data-cost="${b.cost}"

      <span>${b.label}: ${b.count} (${pct}%)</span>
    </div>`;
  }).join('');

  // Render the component
  container.innerHTML = `
    <div class="duration-distribution">
      <div class="duration-bar">${segments}</div>
      <div class="duration-legend">${legendItems}</div>
    </div>
  `;

  // Add tooltip support to segments

// ─── Sessions Table ────────────────────────────────────────────────────────────
function renderSessions(data) {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  const count = document.getElementById('tableCount');
  if (!head || !body) return;

  head.innerHTML = TABLE_COLS.map(c => {
    const isSorted = currentSort.key === c.key;
    const ariaSort = isSorted ? (currentSort.dir === 'desc' ? 'descending' : 'ascending') : 'none';
    const sortLabel = isSorted ? `, sorted ${currentSort.dir === 'desc' ? 'descending' : 'ascending'}` : '';
    const sortIcon = `<svg class="sort-icon" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true"><path d="M6 2L10 7H2L6 2Z"/></svg>`;
    return `<th class="${isSorted ? 'sorted' : ''} ${isSorted && currentSort.dir === 'asc' ? 'asc' : ''} ${c.cssClass}" aria-sort="${ariaSort}" role="columnheader" tabindex="0" onclick="sortBy('${c.key}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();sortBy('${c.key}');}" title="Sort by ${c.label}${sortLabel}">${c.label}${isSorted ? sortIcon : ''}</th>`;
  }).join('');

  let sessions = data.sessions.filter(s => !s.isSubagent);

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    sessions = sessions.filter(s =>
      (s.firstPrompt || '').toLowerCase().includes(q) ||
      (s.model || '').toLowerCase().includes(q) ||
      (projectShort(s.project) || '').toLowerCase().includes(q)
    );
  }

  // Sort
  sessions = [...sessions].sort((a, b) => {
    let va, vb;
    switch (currentSort.key) {
      case 'date': va = a.timestamp; vb = b.timestamp; break;
      case 'prompt': va = a.firstPrompt; vb = b.firstPrompt; break;
      case 'model': va = a.modelShort; vb = b.modelShort; break;
      case 'queries': va = a.queryCount; vb = b.queryCount; break;
      case 'duration': va = a.durationMs; vb = b.durationMs; break;
      case 'cost': va = a.totalCost; vb = b.totalCost; break;
      case 'tokens': va = a.totalTokens; vb = b.totalTokens; break;
      case 'subagents': va = a.subagentCount; vb = b.subagentCount; break;
      default: va = a.totalCost; vb = b.totalCost;
    }
    if (typeof va === 'string') return currentSort.dir === 'desc' ? vb.localeCompare(va) : va.localeCompare(vb);
    return currentSort.dir === 'desc' ? vb - va : va - vb;
  });

  // Pagination
  const totalPages = Math.ceil(sessions.length / PAGE_SIZE);
  // Clamp currentPage to valid range
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = sessions.slice(start, start + PAGE_SIZE);

  // Render pagination controls
  const paginationContainer = document.getElementById('paginationContainer');
  if (paginationContainer) {
    if (totalPages > 1) {
      // Generate page buttons (show at most 5 page numbers)
      let pageButtons = '';
      const maxPages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxPages / 2));
      let endPage = Math.min(totalPages, startPage + maxPages - 1);
      if (endPage - startPage < maxPages - 1) {
        startPage = Math.max(1, endPage - maxPages + 1);
      }
      for (let p = startPage; p <= endPage; p++) {
        pageButtons += `<button ${p === currentPage ? 'class="active"' : ''} onclick="goToPage(${p})">${p}</button>`;
      }
      paginationContainer.innerHTML = `
        <div class="pagination">
          <span class="pagination-info">${start + 1}-${Math.min(start + PAGE_SIZE, sessions.length)} of ${sessions.length}</span>
          <button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})" aria-label="Previous page">&larr;</button>
          ${pageButtons}
          <button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})" aria-label="Next page">&rarr;</button>
        </div>
      `;
    } else {
      paginationContainer.innerHTML = sessions.length > 0 ? `<span class="pagination-info">${sessions.length} sessions</span>` : '';
    }
  }

  // Empty state
  if (sessions.length === 0) {
    body.innerHTML = `
      <tr><td colspan="${TABLE_COLS.length}" style="text-align:center;padding:40px;color:var(--text-muted)">
        ${searchQuery ? `No sessions found matching "${escapeHtml(searchQuery)}"` : 'No sessions found'}
      </td></tr>
    `;
    return;
  }

  body.innerHTML = pageData.map(s => `
    <tr tabindex="0" role="button" data-session-id="${escapeHtml(s.sessionId)}" title="Click to view session details" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openDrawer(this.dataset.sessionId);}">
      <td class="td-mono">${formatDate(s.date)}</td>
      <td class="td-prompt" title="${escapeHtml(s.firstPrompt)}">${escapeHtml(s.firstPrompt.slice(0, 80))}${s.firstPrompt.length > 80 ? '…' : ''}</td>
      <td><span class="model-badge ${modelClass(s.model)}">${escapeHtml(s.modelShort)}</span></td>
      <td class="td-mono td-right">${s.queryCount}</td>
      <td class="td-mono col-duration">${s.durationMs > 0 ? fmtDuration(s.durationMs) : '-'}</td>
      <td class="td-cost">${fmtDollars(s.totalCost)}</td>
      <td class="td-mono td-right col-tokens">${fmt(s.totalTokens)}</td>
      <td class="td-mono td-right col-subagents">${s.subagentCount > 0 ? s.subagentCount : ''}</td>
    </tr>
  `).join('');
}

function sortBy(key) {
  if (currentSort.key === key) {
    currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    currentSort = { key, dir: 'desc' };
  }
  updateUrlState();
  renderSessions(getFilteredData()); // This already re-renders headers with sort icons
}

// ─── File Path Display Helpers ───────────────────────────────────────────────────
function findCommonPrefix(paths) {
  if (paths.length === 0) return '';
  if (paths.length === 1) {
    // Single file: return all but last 3 segments as prefix
    const parts = paths[0].split('/');
    return parts.slice(0, -3).join('/');
  }

  // Split all paths into segments
  const splitPaths = paths.map(p => p.split('/'));
  const minLength = Math.min(...splitPaths.map(p => p.length));

  // Find where paths diverge (stop one before the last to keep at least filename)
  let commonLength = 0;
  for (let i = 0; i < minLength - 1; i++) {
    const segment = splitPaths[0][i];
    if (splitPaths.every(p => p[i] === segment)) {
      commonLength = i + 1;
    } else {
      break;
    }
  }

  return splitPaths[0].slice(0, commonLength).join('/');
}

function formatDisplayPath(filePath, commonPrefix) {
  let displayPath = filePath;

  // Strip common prefix
  if (commonPrefix && filePath.startsWith(commonPrefix + '/')) {
    displayPath = filePath.slice(commonPrefix.length + 1);
  }

  // Replace home directory with ~ for cleaner display
  const homeDir = '/Users/';
  if (displayPath.startsWith(homeDir)) {
    const afterHome = displayPath.slice(homeDir.length);
    const nextSlash = afterHome.indexOf('/');
    if (nextSlash > 0) {
      displayPath = '~' + afterHome.slice(nextSlash);
    }
  }

  // Split into directory and filename
  const parts = displayPath.split('/');
  const fileName = parts.pop() || displayPath;
  const dirPath = parts.join('/');

  return { dirPath: dirPath ? dirPath + '/' : '', fileName };
}

// ─── Skill ROI Quadrant Chart ───────────────────────────────────────────────────
function renderSkillQuadrant(data, highlightedSkill = null) {
  const canvas = document.getElementById('skillQuadrantChart');
  if (!canvas || !data.skillROI || data.skillROI.length === 0) {
    if (canvas) canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No skill data available</div>';
    return;
  }

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 250;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const skills = data.skillROI;
  const pad = { top: 30, right: 30, bottom: 40, left: 60 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Calculate bounds
  const maxCost = Math.max(...skills.map(s => s.avgCostTokens), 1);
  const maxTools = Math.max(...skills.map(s => s.avgToolsTriggered), 1);
  const medianCost = skills.length > 0 ? skills.map(s => s.avgCostTokens).sort((a, b) => a - b)[Math.floor(skills.length / 2)] : maxCost / 2;
  const medianTools = skills.length > 0 ? skills.map(s => s.avgToolsTriggered).sort((a, b) => a - b)[Math.floor(skills.length / 2)] : maxTools / 2;

  // Clear
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-surface').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw quadrant lines
  const midX = pad.left + (medianCost / maxCost) * cw;
  const midY = pad.top + ch - (medianTools / maxTools) * ch;

  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(midX, pad.top);
  ctx.lineTo(midX, pad.top + ch);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pad.left, midY);
  ctx.lineTo(pad.left + cw, midY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw quadrant labels with descriptions
  const textMuted = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  const textSec = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  const green = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
  const orange = getComputedStyle(document.documentElement).getPropertyValue('--orange').trim();
  const purple = getComputedStyle(document.documentElement).getPropertyValue('--purple').trim();
  const red = getComputedStyle(document.documentElement).getPropertyValue('--red').trim();

  // Top-Left: High Impact, Low Cost (USE MORE)
  ctx.fillStyle = green;
  ctx.font = 'bold 10px "Fira Sans"';
  ctx.textAlign = 'center';
  ctx.fillText('✓ Use More', pad.left + (midX - pad.left) / 2, pad.top + 12);
  ctx.fillStyle = textMuted;
  ctx.font = '9px "Fira Sans"';
  ctx.fillText('High Impact, Low Cost', pad.left + (midX - pad.left) / 2, pad.top + 24);

  // Top-Right: High Impact, High Cost (POWER SKILLS)
  ctx.fillStyle = purple;
  ctx.font = 'bold 10px "Fira Sans"';
  ctx.fillText('⚡ Power Skills', midX + (pad.left + cw - midX) / 2, pad.top + 12);
  ctx.fillStyle = textMuted;
  ctx.font = '9px "Fira Sans"';
  ctx.fillText('High Impact, High Cost', midX + (pad.left + cw - midX) / 2, pad.top + 24);

  // Bottom-Left: Low Impact, Low Cost (LIGHT SKILLS)
  ctx.fillStyle = textSec;
  ctx.font = 'bold 10px "Fira Sans"';
  ctx.fillText('○ Light Skills', pad.left + (midX - pad.left) / 2, pad.top + ch - 14);
  ctx.fillStyle = textMuted;
  ctx.font = '9px "Fira Sans"';
  ctx.fillText('Low Impact, Low Cost', pad.left + (midX - pad.left) / 2, pad.top + ch - 2);

  // Bottom-Right: Low Impact, High Cost (REVIEW USAGE)
  ctx.fillStyle = red;
  ctx.font = 'bold 10px "Fira Sans"';
  ctx.fillText('✗ Review Usage', midX + (pad.left + cw - midX) / 2, pad.top + ch - 14);
  ctx.fillStyle = textMuted;
  ctx.font = '9px "Fira Sans"';
  ctx.fillText('Low Impact, High Cost', midX + (pad.left + cw - midX) / 2, pad.top + ch - 2);

  // Efficiency tier color function for visual hierarchy (0-100 percentile scale)
  const getTierColor = (efficiencyScore, alpha = 0.7) => {
    if (efficiencyScore >= 75) return `hsla(142, 70%, 45%, ${alpha})`;  // Green - excellent
    if (efficiencyScore >= 50) return `hsla(45, 90%, 50%, ${alpha})`;   // Yellow - good
    if (efficiencyScore >= 25) return `hsla(25, 85%, 55%, ${alpha})`;   // Orange - moderate
    return `hsla(0, 70%, 55%, ${alpha})`;                                // Red - review
  };

  const getTierStrokeColor = (efficiencyScore) => {
    if (efficiencyScore >= 75) return 'hsl(142, 70%, 35%)';
    if (efficiencyScore >= 50) return 'hsl(45, 90%, 40%)';
    if (efficiencyScore >= 25) return 'hsl(25, 85%, 45%)';
    return 'hsl(0, 70%, 45%)';
  };

  // Draw skill points and store positions for hit testing
  const maxCount = Math.max(...skills.map(s => s.invocationCount), 1);
  const skillPositions = [];

  skills.forEach((skill) => {
    const x = pad.left + (skill.avgCostTokens / maxCost) * cw;
    const y = pad.top + ch - (skill.avgToolsTriggered / maxTools) * ch;
    // Increased size range for better differentiation (6-24px)
    const radius = 6 + (skill.invocationCount / maxCount) * 18;

    // Store position for hit testing
    skillPositions.push({ skill, x, y, radius });

    // Add subtle glow for top performers (75th percentile and above)
    ctx.save();
    if (skill.roiScore >= 75) {
      ctx.shadowColor = 'rgba(74, 222, 128, 0.4)';
      ctx.shadowBlur = 8;
    }

    // Draw bubble with tier-based color
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = getTierColor(skill.roiScore);
    ctx.fill();
    ctx.strokeStyle = getTierStrokeColor(skill.roiScore);
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Draw highlight ring if this is the hovered skill
    if (highlightedSkill && highlightedSkill.skillName === skill.skillName) {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Store skill positions on canvas for event handlers
  canvas._skillPositions = skillPositions;
  canvas._chartData = data;
  canvas._dpr = dpr;

  // Axes labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.font = '11px "Fira Sans"';
  ctx.textAlign = 'center';
  ctx.fillText('Cost (tokens) →', pad.left + cw / 2, H - 5);
  ctx.save();
  ctx.translate(12, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Actions Triggered →', 0, 0);
  ctx.restore();

  // Set up hover interaction (only once)
  if (!canvas._hoverListenerAttached) {
    canvas._hoverListenerAttached = true;

    canvas.addEventListener('mousemove', (e) => {
      const positions = canvas._skillPositions;
      const chartData = canvas._chartData;
      if (!positions || !chartData) return;

      const rect = canvas.getBoundingClientRect();
      // Convert mouse coords to canvas space (accounting for CSS scaling)
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      // Find hovered bubble
      const hovered = positions.find(sp => {
        const dx = mx - sp.x;
        const dy = my - sp.y;
        return Math.sqrt(dx * dx + dy * dy) <= sp.radius;
      });

      if (hovered) {
        canvas.style.cursor = 'pointer';
        // Redraw with highlight
        renderSkillQuadrant(chartData, hovered.skill);
        // Show tooltip
        const s = hovered.skill;
        const effClass = s.roiScore >= 70 ? 'good' : s.roiScore >= 40 ? 'neutral' : 'bad';
        showChartTooltip(e, `
          <div class="chart-tooltip-title" style="word-break:break-all">/${escapeHtml(s.skillName)}</div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Invocations:</span><span class="chart-tooltip-value">${s.invocationCount}</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Avg Cost:</span><span class="chart-tooltip-value">${fmt(s.avgCostTokens)} tokens</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Avg Actions:</span><span class="chart-tooltip-value">${s.avgToolsTriggered.toFixed(1)}</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Success Rate:</span><span class="chart-tooltip-value">${(s.completionRate * 100).toFixed(0)}%</span></div>
          <div class="chart-tooltip-divider"></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-label">Efficiency:</span><span class="chart-tooltip-value ${effClass}">${s.roiScore}</span></div>
        `);
      } else {
        canvas.style.cursor = 'default';
        hideChartTooltip();
        // Redraw without highlight if we were highlighting before
        if (canvas._wasHighlighting) {
          renderSkillQuadrant(chartData, null);
        }
      }
      canvas._wasHighlighting = !!hovered;
    });

    canvas.addEventListener('mouseleave', () => {
      canvas.style.cursor = 'default';
      hideChartTooltip();
      if (canvas._wasHighlighting && canvas._chartData) {
        renderSkillQuadrant(canvas._chartData, null);
        canvas._wasHighlighting = false;
      }
    });
  }
}
