// ─── Context Displacement Stats ─────────────────────────────────────────────────
function renderContextDisplacement(data) {
  const container = document.getElementById('contextDisplacementStats');
  if (!container) return;

  // Use STATS from /api/stats for consistent backend calculations
  // Falls back to client-side calculation if STATS not loaded yet
  let mainTokens, agentTokens, leverageRatio, hasAgentUsage;

  if (STATS && STATS.context) {
    // Prefer server-side calculated values (accurate even when subagent sessions excluded from data.sessions)
    mainTokens = STATS.context.mainSessionTokens;
    agentTokens = STATS.context.agentTokens;
    leverageRatio = STATS.context.leverageRatio;
    hasAgentUsage = STATS.context.hasAgentUsage;
  } else {
    // Fallback to client-side calculation (may be inaccurate if subagents excluded)
    const mainSessions = data.sessions.filter(s => !s.isSubagent);
    const subagentSessions = data.sessions.filter(s => s.isSubagent);
    mainTokens = mainSessions.reduce((a, s) => a + s.totalTokens, 0);
    agentTokens = subagentSessions.reduce((a, s) => a + s.totalTokens, 0);
    const totalTokens = mainTokens + agentTokens;
    leverageRatio = totalTokens > 0 ? agentTokens / totalTokens : null;
    hasAgentUsage = subagentSessions.length > 0 || (data.agentROI?.summary?.totalSpawns > 0);
  }

  // Calculate displacement savings from sessions with vs without agents (client-side is fine here)
  const mainSessions = data.sessions.filter(s => !s.isSubagent);
  const withAgents = mainSessions.filter(s => s.subagentCount > 0);
  const withoutAgents = mainSessions.filter(s => s.subagentCount === 0);

  const avgTokensWithAgents = withAgents.length > 0
    ? withAgents.reduce((a, s) => a + s.totalTokens, 0) / withAgents.length : 0;
  const avgTokensWithoutAgents = withoutAgents.length > 0
    ? withoutAgents.reduce((a, s) => a + s.totalTokens, 0) / withoutAgents.length : 0;

  const displacementSavings = avgTokensWithAgents > 0 && avgTokensWithoutAgents > 0
    ? ((avgTokensWithoutAgents - avgTokensWithAgents) / avgTokensWithoutAgents * 100) : 0;

  // Format leverage ratio (show "N/A" if null)
  const leverageDisplay = leverageRatio !== null ? (leverageRatio * 100).toFixed(1) + '%' : 'N/A';

  container.innerHTML = `
    <div class="displacement-grid">
      <div class="displacement-card">
        <div class="displacement-label">Main Session Tokens</div>
        <div class="displacement-value">${fmt(mainTokens)}</div>
      </div>
      <div class="displacement-card">
        <div class="displacement-label">Agent Tokens</div>
        <div class="displacement-value">${fmt(agentTokens)}</div>
      </div>
      <div class="displacement-card">
        <div class="displacement-label">Leverage Ratio</div>
        <div class="displacement-value">${leverageDisplay}</div>
      </div>
      <div class="displacement-card">
        <div class="displacement-label">Context Offloaded</div>
        <div class="displacement-value ${displacementSavings > 0 ? 'good' : ''}">${displacementSavings > 0 ? displacementSavings.toFixed(0) + '%' : 'N/A'}</div>
      </div>
    </div>
    <div class="displacement-insight">
      ${hasAgentUsage && displacementSavings > 10
        ? `✅ Sessions using agents have ${Math.abs(displacementSavings).toFixed(0)}% ${displacementSavings > 0 ? 'fewer' : 'more'} main context tokens`
        : !hasAgentUsage ? '💡 No agent usage detected in this period' : '📊 Agent usage has minimal context impact'}
    </div>
  `;
}

// ─── Context Heatmap ────────────────────────────────────────────────────────────
function renderContextHeatmap(data) {
  const canvas = document.getElementById('contextHeatmapChart');
  if (!canvas || !data.contextHeatmap || data.contextHeatmap.length === 0) {
    if (canvas) canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No context data</div>';
    return;
  }

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 200;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const turnBuckets = ['1-5', '6-10', '11-20', '21-50', '51+'];
  const utilizationBuckets = ['0-20%', '21-40%', '41-60%', '61-80%', '81-100%'];

  const pad = { top: 30, right: 80, bottom: 50, left: 80 };
  const cellW = (W - pad.left - pad.right) / turnBuckets.length;
  const cellH = (H - pad.top - pad.bottom) / utilizationBuckets.length;

  // Build lookup map
  const heatmap = new Map();
  data.contextHeatmap.forEach(p => {
    heatmap.set(`${p.turnBucket}|${p.utilizationBucket}`, p);
  });

  const maxCount = Math.max(...data.contextHeatmap.map(p => p.count), 1);

  // Clear
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-surface').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw cells
  turnBuckets.forEach((turn, i) => {
    utilizationBuckets.forEach((util, j) => {
      const point = heatmap.get(`${turn}|${util}`);
      const x = pad.left + i * cellW;
      const y = pad.top + j * cellH;

      if (point && point.count > 0) {
        // Viridis-inspired perceptually uniform scale (colorblind-friendly)
        // Goes from dark purple/blue (low) → teal → green → yellow (high)
        const intensity = Math.sqrt(point.count / maxCount); // sqrt for better distribution
        ctx.fillStyle = viridisColor(intensity);
      } else {
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-elevated').trim();
      }

      ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);

      // Add cell border for grid clarity
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 1, y + 1, cellW - 2, cellH - 2);

      // Count label with adaptive text color
      if (point && point.count > 0) {
        const intensity = Math.sqrt(point.count / maxCount);
        // Dark text on light cells (high intensity), light text on dark cells
        ctx.fillStyle = intensity > 0.5 ? 'rgba(0, 0, 0, 0.8)' : 'rgba(255, 255, 255, 0.9)';
        ctx.font = '600 12px "Fira Code"';
        ctx.textAlign = 'center';
        ctx.fillText(point.count.toString(), x + cellW / 2, y + cellH / 2 + 4);
      }
    });
  });

  // X-axis labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
  ctx.font = '12px "Fira Sans"';
  ctx.textAlign = 'center';
  turnBuckets.forEach((turn, i) => {
    ctx.fillText(turn, pad.left + i * cellW + cellW / 2, H - 25);
  });
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.fillText('Turns →', W / 2, H - 5);

  // Y-axis labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
  ctx.textAlign = 'right';
  utilizationBuckets.forEach((util, j) => {
    ctx.fillText(util, pad.left - 5, pad.top + j * cellH + cellH / 2 + 4);
  });
  ctx.save();
  ctx.translate(15, pad.top + (H - pad.top - pad.bottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.fillText('Cache Hit Ratio →', 0, 0);
  ctx.restore();

  // Color scale legend (right side)
  const legendX = W - pad.right + 15;
  const legendY = pad.top;
  const legendW = 12;
  const legendH = H - pad.top - pad.bottom;
  const legendSteps = 20;
  for (let i = 0; i < legendSteps; i++) {
    const t = 1 - (i / (legendSteps - 1)); // High at top, low at bottom
    const y = legendY + (i / legendSteps) * legendH;
    const h = legendH / legendSteps + 1;
    ctx.fillStyle = viridisColor(t);
    ctx.fillRect(legendX, y, legendW, h);
  }
  // Legend labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  ctx.font = '9px "Fira Code"';
  ctx.textAlign = 'left';
  ctx.fillText(maxCount.toString(), legendX + legendW + 4, legendY + 6);
  ctx.fillText('0', legendX + legendW + 4, legendY + legendH);
  ctx.fillText('Sessions', legendX - 2, legendY - 8);

  // Tooltip support for heatmap cells
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height / dpr);

    // Check if within grid area
    if (x >= pad.left && x <= W - pad.right && y >= pad.top && y <= H - pad.bottom) {
      const colIndex = Math.floor((x - pad.left) / cellW);
      const rowIndex = Math.floor((y - pad.top) / cellH);

      if (colIndex >= 0 && colIndex < turnBuckets.length && rowIndex >= 0 && rowIndex < utilizationBuckets.length) {
        const turnBucket = turnBuckets[colIndex];
        const utilBucket = utilizationBuckets[rowIndex];
        const point = heatmap.get(`${turnBucket}|${utilBucket}`);

        if (point && point.count > 0) {
          showChartTooltip(e, `
            <div class="chart-tooltip-title">Turns: ${turnBucket}</div>
            <div class="chart-tooltip-row"><span class="chart-tooltip-label">Cache Ratio:</span><span class="chart-tooltip-value">${utilBucket}</span></div>
            <div class="chart-tooltip-row"><span class="chart-tooltip-label">Sessions:</span><span class="chart-tooltip-value">${point.count}</span></div>
            <div class="chart-tooltip-row"><span class="chart-tooltip-label">Total Cost:</span><span class="chart-tooltip-value">${fmtDollars(point.totalCost || 0)}</span></div>
          `);
          return;
        }
      }
    }
    hideChartTooltip();
  };
  canvas.onmouseleave = hideChartTooltip;
}

// ─── Cache Efficiency Curve ─────────────────────────────────────────────────────
function renderCacheEfficiencyCurve(data) {
  const canvas = document.getElementById('cacheEfficiencyChart');
  if (!canvas || !data.cacheEfficiencyCurve || data.cacheEfficiencyCurve.length === 0) {
    if (canvas) canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No cache efficiency data</div>';
    return;
  }

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 200;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const points = data.cacheEfficiencyCurve.slice(0, 50);
  const pad = { top: 20, right: 30, bottom: 40, left: 50 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const maxTurn = Math.max(...points.map(p => p.turn), 1);
  const maxRatio = Math.max(...points.map(p => p.avgCacheHitRatio), 0.1);

  // Clear
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-surface').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw grid
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + cw, y);
    ctx.stroke();
  }

  // Draw line
  ctx.beginPath();
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
  ctx.lineWidth = 2;
  points.forEach((p, i) => {
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.avgCacheHitRatio / maxRatio) * ch;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Draw dots
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
  points.forEach(p => {
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.avgCacheHitRatio / maxRatio) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ideal line (70% efficiency target)
  ctx.beginPath();
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  ctx.setLineDash([4, 4]);
  const idealY = pad.top + ch - (0.7 * maxRatio) / maxRatio * ch;
  ctx.moveTo(pad.left, idealY);
  ctx.lineTo(pad.left + cw, idealY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Optimal session length indicator (vertical line)
  const optimal = data.optimalSessionLength ?? 0;
  if (optimal > 0 && optimal <= maxTurn) {
    const optimalX = pad.left + (optimal / maxTurn) * cw;
    ctx.beginPath();
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.moveTo(optimalX, pad.top);
    ctx.lineTo(optimalX, pad.top + ch);
    ctx.stroke();
    ctx.setLineDash([]);

    // Optimal label
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    ctx.font = '600 10px "Fira Code"';
    ctx.textAlign = 'center';
    ctx.fillText(`Optimal: ${optimal}`, optimalX, pad.top - 5);
  }

  // Labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.font = '11px "Fira Sans"';
  ctx.textAlign = 'center';
  ctx.fillText('Turn Number →', W / 2, H - 5);

  ctx.textAlign = 'right';
  ctx.fillText((maxRatio * 100).toFixed(0) + '%', pad.left - 5, pad.top + 5);
  ctx.fillText('0%', pad.left - 5, pad.top + ch + 5);

  // Add tooltip support for data points
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width / dpr);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height / dpr);

    // Find nearest point
    let nearest = null;
    let minDist = 20; // 20px threshold
    for (const p of points) {
      const px = pad.left + (p.turn / maxTurn) * cw;
      const py = pad.top + ch - (p.avgCacheHitRatio / maxRatio) * ch;
      const dist = Math.sqrt((x - px) ** 2 + (y - py) ** 2);
      if (dist < minDist) {
        minDist = dist;
        nearest = p;
      }
    }

    if (nearest) {
      showChartTooltip(e, `
        <div class="chart-tooltip-title">Turn ${nearest.turn}</div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Cache Hit Ratio:</span><span class="chart-tooltip-value">${(nearest.avgCacheHitRatio * 100).toFixed(1)}%</span></div>
        <div class="chart-tooltip-row"><span class="chart-tooltip-label">Sessions:</span><span class="chart-tooltip-value">${nearest.sessionCount || '-'}</span></div>
      `);
    } else {
      hideChartTooltip();
    }
  };
  canvas.onmouseleave = hideChartTooltip;
}

// ─── Context Window Growth ──────────────────────────────────────────────────────
function renderContextWindowFill(data) {
  const canvas = document.getElementById('contextWindowFillChart');
  if (!canvas || !data.contextWindowFill || data.contextWindowFill.length === 0) {
    if (canvas) canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No context window data</div>';
    return;
  }

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 200;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const points = data.contextWindowFill.slice(0, 50);
  const pad = { top: 20, right: 30, bottom: 40, left: 60 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Use 200K context window as default (could be made model-specific in future)
  const contextWindowSize = 200000;
  const maxTurn = Math.max(...points.map(p => p.turn), 1);

  // Clear
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-surface').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw danger zone (80-100%) with stronger red tint
  ctx.fillStyle = 'rgba(248, 81, 73, 0.12)';
  ctx.fillRect(pad.left, pad.top, cw, ch * 0.2);

  // Draw subtle horizontal gridlines at 25%, 50%, 75%
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(pct => {
    const y = pad.top + ch * (1 - pct);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + cw, y);
    ctx.stroke();
  });

  // Draw 100% reference line
  ctx.strokeStyle = 'rgba(255, 100, 100, 0.5)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left + cw, pad.top);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw 80% threshold line with "Danger Zone" label
  ctx.strokeStyle = 'rgba(248, 81, 73, 0.8)';
  ctx.setLineDash([6, 4]);
  ctx.lineWidth = 2;
  ctx.beginPath();
  const y80 = pad.top + ch * 0.2;
  ctx.moveTo(pad.left, y80);
  ctx.lineTo(pad.left + cw, y80);
  ctx.stroke();
  ctx.setLineDash([]);

  // "Danger Zone" label
  ctx.fillStyle = 'rgba(248, 81, 73, 0.9)';
  ctx.font = '10px "Fira Sans"';
  ctx.textAlign = 'right';
  ctx.fillText('⚠ Danger Zone', pad.left + cw - 5, y80 - 5);

  // Draw main grid
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + cw, y);
    ctx.stroke();
  }

  // Draw P25-P75 shaded area
  ctx.fillStyle = 'rgba(100, 200, 100, 0.2)';
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.p75Tokens / contextWindowSize) * ch;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  for (let i = points.length - 1; i >= 0; i--) {
    const p = points[i];
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.p25Tokens / contextWindowSize) * ch;
    ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // Draw average line
  ctx.beginPath();
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
  ctx.lineWidth = 2;
  points.forEach((p, i) => {
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.avgTokens / contextWindowSize) * ch;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Draw dots for data points (larger for visibility)
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
  points.forEach(p => {
    const x = pad.left + (p.turn / maxTurn) * cw;
    const y = pad.top + ch - (p.avgTokens / contextWindowSize) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.font = '12px "Fira Sans"';
  ctx.textAlign = 'center';
  ctx.fillText('Turn Number →', W / 2, H - 5);

  // Y-axis percentage labels
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
  ctx.font = '12px "Fira Sans"';
  ctx.textAlign = 'right';
  ctx.fillText('100%', pad.left - 5, pad.top + 5);
  ctx.fillText('80%', pad.left - 5, pad.top + ch * 0.2 + 5);
  ctx.fillText('50%', pad.left - 5, pad.top + ch * 0.5 + 5);
  ctx.fillText('0%', pad.left - 5, pad.top + ch + 5);

  // Y-axis label
  ctx.save();
  ctx.translate(12, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.fillText('Context %', 0, 0);
  ctx.restore();
}

// ─── Peak Context Distribution ──────────────────────────────────────────────────
function renderPeakContextDistribution(data) {
  const canvas = document.getElementById('peakContextDistributionChart');
  if (!canvas || !data.peakContextDistribution || data.peakContextDistribution.length === 0) {
    if (canvas) canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No peak context data</div>';
    return;
  }

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 200;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  // Use 200K context window as default
  const contextWindowSize = 200000;

  // Bucket sessions by peak usage percentage (shortened labels)
  const buckets = [
    { label: '0-10', min: 0, max: 0.1, count: 0 },
    { label: '10-20', min: 0.1, max: 0.2, count: 0 },
    { label: '20-30', min: 0.2, max: 0.3, count: 0 },
    { label: '30-40', min: 0.3, max: 0.4, count: 0 },
    { label: '40-50', min: 0.4, max: 0.5, count: 0 },
    { label: '50-60', min: 0.5, max: 0.6, count: 0 },
    { label: '60-70', min: 0.6, max: 0.7, count: 0 },
    { label: '70-80', min: 0.7, max: 0.8, count: 0 },
    { label: '80-90', min: 0.8, max: 0.9, count: 0 },
    { label: '90-100', min: 0.9, max: 1.0, count: 0 },
  ];

  data.peakContextDistribution.forEach(session => {
    const pct = session.peakTokens / contextWindowSize;
    for (const bucket of buckets) {
      if (pct >= bucket.min && pct < bucket.max) {
        bucket.count++;
        break;
      }
    }
    // Handle 100% case
    if (pct >= 1.0) buckets[buckets.length - 1].count++;
  });

  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  const barWidth = cw / buckets.length - 4;
  const maxCount = Math.max(...buckets.map(b => b.count), 1);

  // Clear
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-surface').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw bars
  buckets.forEach((bucket, i) => {
    const x = pad.left + i * (cw / buckets.length) + 2;
    const barHeight = bucket.count > 0 ? (bucket.count / maxCount) * ch : 0;
    const y = pad.top + ch - barHeight;

    // Color gradient: green (low) to orange (mid) to red (high)
    const pctMid = (bucket.min + bucket.max) / 2;
    let hue = 120 - pctMid * 120; // green=120, red=0
    if (pctMid > 0.8) hue = 0; // Force red for danger zone

    ctx.fillStyle = `hsla(${hue}, 60%, 50%, 0.8)`;
    ctx.fillRect(x, y, barWidth, barHeight);

    // Add red stroke outline for >80% bars (danger zone)
    if (bucket.min >= 0.8 && barHeight > 0) {
      ctx.strokeStyle = 'rgba(248, 81, 73, 1)';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, barWidth, barHeight);
    }

    // Count label on top of bar
    if (bucket.count > 0) {
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
      ctx.font = '600 11px "Fira Code"';
      ctx.textAlign = 'center';
      ctx.fillText(bucket.count.toString(), x + barWidth / 2, y - 5);
    }
  });

  // X-axis labels (horizontal for better readability)
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
  ctx.font = '11px "Fira Sans"';
  ctx.textAlign = 'center';
  buckets.forEach((bucket, i) => {
    const x = pad.left + i * (cw / buckets.length) + barWidth / 2 + 2;
    // Alternate vertical offset for overlapping labels
    const yOffset = i % 2 === 0 ? H - 22 : H - 12;
    ctx.fillText(bucket.label, x, yOffset);
  });

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.fillText('Peak Context Usage (%) →', W / 2, H - 2);

  // Y-axis label
  ctx.save();
  ctx.translate(12, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
  ctx.fillText('Sessions', 0, 0);
  ctx.restore();

  // Y-axis values
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
  ctx.font = '12px "Fira Sans"';
  ctx.textAlign = 'right';
  ctx.fillText(maxCount.toString(), pad.left - 5, pad.top + 5);
  ctx.fillText('0', pad.left - 5, pad.top + ch + 5);
}

// ─── Command Stats ──────────────────────────────────────────────────────────────
function renderCommandStats(data) {
  const container = document.getElementById('commandStatsBars');
  if (!container || !data.commandStats || data.commandStats.length === 0) {
    if (container) container.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No slash command data</div>';
    return;
  }

  const commands = data.commandStats.slice(0, 10);
  const maxCount = Math.max(...commands.map(c => c.usageCount), 1);

  container.innerHTML = commands.map(cmd => {
    const pct = (cmd.usageCount / maxCount) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label"><code>/${escapeHtml(cmd.command)}</code></div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:var(--accent)"></div>
        </div>
        <div class="bar-value">${cmd.usageCount} <span style="color:var(--text-muted);font-size:0.7rem">(${fmtDollars(cmd.avgSessionCost)})</span></div>
      </div>
    `;
  }).join('');
}

/**
 * Combined Tool Performance view - merges Top Tools + Tool Success Rates
 * Shows tool usage with inline success rate indicators
 */
function renderToolPerformance(data) {
  const container = document.getElementById('toolPerformance');
  if (!container) return;

  const tools = data.toolUsage?.slice(0, 10) || [];
  const healthMap = new Map((data.toolHealth || []).map(t => [t.name, t]));

  if (tools.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No tool data available</div>';
    return;
  }

  const maxCount = tools[0]?.count || 1;

  container.innerHTML = `
    <div class="tool-performance-grid">
      ${tools.map((t, idx) => {
        const health = healthMap.get(t.name);
        const successRate = health ? (1 - health.errorRate) * 100 : null;
        const successColor = successRate === null ? 'var(--text-muted)' :
          successRate >= 95 ? 'var(--green)' :
          successRate >= 85 ? 'var(--orange)' : 'var(--red)';
        const barWidth = (t.count / maxCount * 100).toFixed(1);

        return `
          <div class="tool-perf-row">
            <div class="tool-perf-name" title="${escapeHtml(t.name)}">${escapeHtml(toolNameShort(t.name))}</div>
            <div class="tool-perf-bar-container">
              <div class="tool-perf-bar${idx < 3 ? ' rank-top' : ''}" style="width:${barWidth}%">
                <span class="tool-perf-count">${fmt(t.count)}</span>
              </div>
            </div>
            <div class="tool-perf-health" style="color:${successColor}">
              ${successRate !== null ? `${successRate.toFixed(0)}%` : '-'}
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="tool-performance-legend">
      <span style="color:var(--text-muted);font-size:0.7rem">Usage count</span>
      <span style="color:var(--text-muted);font-size:0.7rem">Success %</span>
    </div>
  `;
}

/**
 * Combined File Activity view - merges Most Accessed Files + File Types
 * Shows top files with operation breakdown and extension summary
 */
function renderFileActivityCombined(data) {
  const container = document.getElementById('fileActivityCombined');
  if (!container) return;

  const files = data.fileActivity?.slice(0, 8) || [];
  const extensions = data.fileExtensions?.slice(0, 6) || [];

  if (files.length === 0 && extensions.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No file activity tracked</div>';
    return;
  }

  // File activity table
  let fileHtml = '';
  if (files.length > 0) {
    const allPaths = files.map(f => f.filePath);
    const commonPrefix = findCommonPrefix(allPaths);

    fileHtml = `
      <div class="file-activity-table">
        <div class="file-activity-header">
          <span>File</span>
          <span class="file-op-header">R</span>
          <span class="file-op-header">E</span>
          <span class="file-op-header">W</span>
        </div>
        ${files.map(f => {
          const { dirPath, fileName } = formatDisplayPath(f.filePath, commonPrefix);
          const reads = f.readCount ?? f.reads ?? 0;
          const edits = f.editCount ?? f.edits ?? 0;
          const writes = f.writeCount ?? f.writes ?? 0;
          return `
            <div class="file-activity-row" title="${escapeHtml(f.filePath)}">
              <span class="file-name"><span class="file-dir">${escapeHtml(dirPath)}</span>${escapeHtml(fileName)}</span>
              <span class="file-op" style="color:var(--blue)">${reads}</span>
              <span class="file-op" style="color:var(--orange)">${edits}</span>
              <span class="file-op" style="color:var(--green)">${writes}</span>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // Extension summary (compact bar representation)
  let extHtml = '';
  if (extensions.length > 0) {
    const total = extensions.reduce((sum, e) => sum + e.count, 0);
    const colors = ['var(--blue)', 'var(--green)', 'var(--accent)', 'var(--purple)', 'var(--orange)', 'var(--red)'];

    extHtml = `
      <div class="file-ext-summary">
        <div class="file-ext-bar">
          ${extensions.map((e, i) => {
            const pct = (e.count / total * 100);
            return `<div class="file-ext-segment" style="flex:${Math.max(pct, 2)};background:${colors[i % colors.length]}" title=".${e.extension}: ${e.count} (${pct.toFixed(0)}%)"></div>`;
          }).join('')}
        </div>
        <div class="file-ext-labels">
          ${extensions.slice(0, 5).map((e, i) => `
            <span class="file-ext-label">
              <span class="file-ext-dot" style="background:${colors[i % colors.length]}"></span>
              .${escapeHtml(e.extension)} (${e.count})
            </span>
          `).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = fileHtml + extHtml;
}

// ─── Drawer Panel ───────────────────────────────────────────────────────────────
let drawerTriggerElement = null;
let currentDrawerSessionId = null;

async function openDrawer(sessionId, highlightPrompt = null) {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  const header = document.getElementById('drawerHeader');
  const content = document.getElementById('drawerContent');
  if (!drawer || !overlay) return;

  // Store trigger for focus restoration
  drawerTriggerElement = document.activeElement;
  currentDrawerSessionId = sessionId;
  drawer.dataset.sessionId = sessionId;

  // Show loading state
  header.innerHTML = '<div class="drawer-header-info"><div class="drawer-title">Loading...</div></div>';
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Loading session details...</div></div>';

  // Open drawer
  overlay.classList.add('open');
  drawer.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus the drawer for accessibility
  drawer.focus();

  // Fetch full session with per-query data
  let session;
  try {
    const resp = await fetch('/api/session?id=' + encodeURIComponent(sessionId));
    if (!resp.ok) throw new Error('Not found');
    session = await resp.json();
  } catch {
    header.innerHTML = '<div class="drawer-header-info"><div class="drawer-title">Error</div></div><div class="drawer-actions"><button class="btn-close" onclick="closeDrawer()" aria-label="Close panel">&times;</button></div>';
    content.innerHTML = '<div style="color:var(--text-muted);padding:20px">Session not found</div>';
    return;
  }

  // Build navigation buttons
  const data = getFilteredData();
  const sessions = data ? data.sessions : [];
  const currentIndex = sessions.findIndex(s => s.sessionId === sessionId);
  const hasPrev = currentIndex > 0;
  const hasNext = currentIndex < sessions.length - 1 && currentIndex !== -1;

  // Group queries by user prompt
  const turns = [];
  let currentPrompt = '';
  let currentTurn = null;

  for (const q of session.queries) {
    if (q.userPrompt && q.userPrompt !== currentPrompt) {
      if (currentTurn) turns.push(currentTurn);
      currentPrompt = q.userPrompt;
      currentTurn = { prompt: q.userPrompt, queries: [q], totalTokens: q.totalTokens, cost: q.cost, tools: [...q.toolUses] };
    } else if (currentTurn) {
      currentTurn.queries.push(q);
      currentTurn.totalTokens += q.totalTokens;
      currentTurn.cost += q.cost;
      currentTurn.tools.push(...q.toolUses);
    } else {
      currentTurn = { prompt: q.userPrompt || '(continuation)', queries: [q], totalTokens: q.totalTokens, cost: q.cost, tools: [...q.toolUses] };
    }
  }
  if (currentTurn) turns.push(currentTurn);

  header.innerHTML = `
    <div class="drawer-header-info">
      <div class="drawer-title">${escapeHtml(session.firstPrompt.slice(0, 100))}</div>
      <div class="drawer-meta">
        ${formatDate(session.date)} &middot;
        <span class="model-badge ${modelClass(session.model)}">${escapeHtml(session.modelShort)}</span> &middot;
        ${session.queryCount} messages &middot;
        ${fmtDollars(session.totalCost)} &middot;
        ${fmt(session.totalTokens)} tokens
        ${session.durationMs > 0 ? ' &middot; ' + fmtDuration(session.durationMs) : ''}
        ${session.subagentCount > 0 ? ` &middot; <span class="subagent-badge">${session.subagentCount} subagents</span>` : ''}
        ${session.compactions > 0 ? ` &middot; ${session.compactions} compactions` : ''}
      </div>
    </div>
    <div class="drawer-actions">
      <button class="btn-nav" onclick="navigateDrawer(-1)" ${!hasPrev ? 'disabled' : ''} aria-label="Previous session" title="Previous session (↑)">&#x25B2;</button>
      <button class="btn-nav" onclick="navigateDrawer(1)" ${!hasNext ? 'disabled' : ''} aria-label="Next session" title="Next session (↓)">&#x25BC;</button>
      <button class="btn-close" onclick="closeDrawer()" aria-label="Close panel" title="Close (Esc)">&times;</button>
    </div>
  `;

  content.innerHTML = `
    <div class="turn-list">
      ${turns.map((t, i) => `
        <div class="turn-item">
          <div class="turn-num">${i + 1}</div>
          <div>
            <div class="turn-prompt">${escapeHtml(t.prompt.slice(0, 300))}</div>
            ${t.tools.length > 0 ? `<div class="turn-tools">Tools: ${[...new Set(t.tools)].map(escapeHtml).join(', ')}</div>` : ''}
          </div>
          <div class="turn-stats">
            <div class="turn-cost">${fmtDollars(t.cost)}</div>
            <div class="turn-tokens">${fmt(t.totalTokens)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  // Highlight and scroll to the matching prompt if specified
  if (highlightPrompt) {
    const turnItems = content.querySelectorAll('.turn-item');
    for (const item of turnItems) {
      const promptText = item.querySelector('.turn-prompt')?.textContent;
      // Match by comparing the first 50 chars (prompt text is truncated)
      if (promptText && highlightPrompt.slice(0, 50) === promptText.slice(0, 50)) {
        item.classList.add('highlighted');
        // Delay scroll to allow drawer animation to complete
        setTimeout(() => {
          item.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 150);
        break;
      }
    }
  }
}

function closeDrawer() {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');

  if (drawer) drawer.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
  currentDrawerSessionId = null;

  // Restore focus to trigger element
  if (drawerTriggerElement && typeof drawerTriggerElement.focus === 'function') {
    drawerTriggerElement.focus();
  }
  drawerTriggerElement = null;
}

function navigateDrawer(direction) {
  const drawer = document.getElementById('drawer');
  if (!drawer) return;

  const currentId = drawer.dataset.sessionId;
  const data = getFilteredData();
  const sessions = data ? data.sessions : [];
  const currentIndex = sessions.findIndex(s => s.sessionId === currentId);

  if (currentIndex === -1) return;

  const nextIndex = currentIndex + direction;
  if (nextIndex >= 0 && nextIndex < sessions.length) {
    openDrawer(sessions[nextIndex].sessionId);
  }
}

// Drawer event handlers
document.getElementById('drawerOverlay')?.addEventListener('click', closeDrawer);

document.addEventListener('keydown', (e) => {
  const drawer = document.getElementById('drawer');
  if (!drawer?.classList.contains('open')) return;

  if (e.key === 'Escape') {
    closeDrawer();
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    navigateDrawer(-1);
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    navigateDrawer(1);
  }
});

// ─── Resize Handler ────────────────────────────────────────────────────────────
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    const data = getFilteredData();
    if (data) {
      renderDailyChart(data);
      renderModelChart(data);
      renderProjectChart(data);

matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {

// ─── Event Delegation for Session Clicks (XSS-safe) ────────────────────────────
document.addEventListener('click', (e) => {
  // Ignore clicks inside the drawer panel (fixes X button reopening issue)
  if (e.target.closest('.drawer')) return;

  // Check for prompt card clicks first (they have data-prompt-text)
  const promptEl = e.target.closest('.prompt-row[data-prompt-text]');
  if (promptEl) {
    openDrawer(promptEl.dataset.sessionId, promptEl.dataset.promptText);
    return;
  }

  // Handle session row clicks
  const sessionEl = e.target.closest('[data-session-id]');
  if (sessionEl) {
    openDrawer(sessionEl.dataset.sessionId);
  }
});

// ─── Chart Tooltip System ──────────────────────────────────────────────────────
function showChartTooltip(e, content) {
  const tooltip = document.getElementById('chartTooltip');
  if (!tooltip) return;

  tooltip.innerHTML = content;
  tooltip.style.display = 'block';

  // Measure tooltip after content is set
  const rect = tooltip.getBoundingClientRect();
  const margin = 12;
  const viewportW = window.innerWidth;
  const viewportH = window.innerHeight;

  // Quadrant-based positioning: tooltip appears opposite to cursor
  // Horizontal: prefer right, flip to left if would overflow
  // Vertical: prefer below, flip to above if would overflow
  const cursorInRightHalf = e.clientX > viewportW / 2;
  const cursorInBottomHalf = e.clientY > viewportH / 2;

  let x, y;

  if (cursorInRightHalf) {
    // Place tooltip to the left of cursor
    x = e.clientX - rect.width - margin;
  } else {
    // Place tooltip to the right of cursor
    x = e.clientX + margin;
  }

  if (cursorInBottomHalf) {
    // Place tooltip above cursor
    y = e.clientY - rect.height - margin;
  } else {
    // Place tooltip below cursor
    y = e.clientY + margin;
  }

  // Clamp to viewport bounds with margin
  x = Math.max(margin, Math.min(x, viewportW - rect.width - margin));
  y = Math.max(margin, Math.min(y, viewportH - rect.height - margin));

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideChartTooltip() {
  const tooltip = document.getElementById('chartTooltip');
  if (tooltip) tooltip.style.display = 'none';
}

// ─── Highlights Card System ────────────────────────────────────────────────────
let highlightsTriggerElement = null;

function computeStreak(dailyUsage) {
  if (!dailyUsage || dailyUsage.length === 0) return 0;
  const sorted = [...dailyUsage].sort((a, b) => b.date.localeCompare(a.date));
  let streak = 0;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let expected = new Date(today);

  for (const day of sorted) {
    const dayDate = new Date(day.date + 'T00:00:00');
    const diff = Math.round((expected - dayDate) / (1000 * 60 * 60 * 24));
    if (diff <= 1 && day.sessions > 0) {
      streak++;
      expected.setDate(expected.getDate() - 1);
    } else if (diff > 1) break;
  }
  return streak;
}

function computeBadges(data) {
  const badges = [];
  const t = data.totals;

  // Precision badge: Low tool error rate (< 3%)
  const toolErrorRate = data.toolHealth?.reduce((sum, tool) => sum + tool.errorRate * tool.totalCalls, 0) /
    data.toolHealth?.reduce((sum, tool) => sum + tool.totalCalls, 0) || 0;
  const successRate = 1 - toolErrorRate;
  if (successRate >= 0.97) {
    badges.push({ icon: '🎯', name: 'Precision', value: `${(successRate * 100).toFixed(1)}%`, desc: 'Tool success rate' });
  }

  // Orchestrator badge: Uses subagents frequently
  if (t.totalSubagents > 20) {
    badges.push({ icon: '🤖', name: 'Orchestrator', value: `${t.totalSubagents}`, desc: 'Subagents deployed' });
  }

  // Deep Thinker badge: High thinking character count (approximated from output)
  const thinkingChars = t.output * 4; // Rough estimate based on output tokens
  if (thinkingChars > 500000) {
    badges.push({ icon: '🧠', name: 'Deep Thinker', value: `${(thinkingChars / 1e6).toFixed(1)}M`, desc: 'Thinking chars' });
  }

  // Disciplined badge: Many efficient sessions (under 30 queries each)
  const efficientSessions = data.sessions?.filter(s => s.queryCount <= 30).length || 0;
  const efficientRatio = data.sessions?.length ? efficientSessions / data.sessions.length : 0;
  if (efficientRatio >= 0.5 && data.sessions?.length >= 10) {
    badges.push({ icon: '📐', name: 'Disciplined', value: `${Math.round(efficientRatio * 100)}%`, desc: 'Efficient sessions' });
  }

  // Tester badge: Many test executions
  const testCount = data.bashCommands?.find(c => c.category === 'build_test')?.count || 0;
  if (testCount > 100) {
    badges.push({ icon: '🔬', name: 'Tester', value: `${testCount}`, desc: 'Test runs' });
  }

  // Automator badge: Uses hooks
  const hookExecutions = data.sessions?.reduce((sum, s) => sum + (s.hookExecutions || 0), 0) || 0;
  if (hookExecutions > 50) {
    badges.push({ icon: '⚡', name: 'Automator', value: `${hookExecutions}`, desc: 'Hook executions' });
  }

  return badges.slice(0, 3); // Show top 3 earned
}

function getCacheEfficiencyLabel(ratio) {
  if (ratio >= 35) return { label: 'Excellent ⚡', color: '#3FB950' };
  if (ratio >= 25) return { label: 'Great', color: '#58A6FF' };
  if (ratio >= 10) return { label: 'Good', color: '#D4A04A' };
  return { label: 'Building up', color: '#94a3b8' };
}

function computeHighlightsData() {
  const data = getFilteredData();
  if (!data) return null;

  const t = data.totals;
  const streak = computeStreak(data.dailyUsage);
  const badges = computeBadges(data);
  const cacheStatus = getCacheEfficiencyLabel(t.cacheEfficiencyRatio);

  // Model breakdown with percentages
  const totalModelCost = data.modelBreakdown.reduce((sum, m) => sum + m.totalCost, 0);
  const models = data.modelBreakdown.slice(0, 3).map(m => ({
    name: m.modelShort,
    cost: m.totalCost,
    pct: totalModelCost > 0 ? (m.totalCost / totalModelCost * 100) : 0
  }));

  // Top 3 tools
  const maxToolCount = data.toolUsage[0]?.count || 1;
  const topTools = data.toolUsage.slice(0, 3).map(tool => ({
    name: tool.name,
    count: tool.count,
    pct: (tool.count / maxToolCount * 100)
  }));

  // Previous period comparison
  const prev = getPreviousPeriodTotals();
  let costTrend = null;
  let savingsTrend = null;
  if (prev) {
    if (prev.totalCost > 0) {
      const costChange = ((t.totalCost - prev.totalCost) / prev.totalCost * 100);
      costTrend = { pct: costChange, dir: costChange > 0 ? 'up' : 'down' };
    }
    if (prev.savedByCaching > 0) {
      const savingsChange = ((t.savedByCaching - prev.savedByCaching) / prev.savedByCaching * 100);
      savingsTrend = { pct: savingsChange, dir: savingsChange > 0 ? 'up' : 'down' };
    }
  }

  return {
    totalCost: t.totalCost,
    savedByCaching: t.savedByCaching,
    cacheRatio: t.cacheEfficiencyRatio,
    cacheStatus,
    totalSessions: t.totalSessions,
    totalQueries: t.totalQueries,
    totalSubagents: t.totalSubagents,
    dateRange: t.dateRange,
    streak,
    badges,
    models,
    topTools,
    costTrend,
    savingsTrend
  };
}

function createGrainPattern(ctx) {
  const patternCanvas = document.createElement('canvas');
  patternCanvas.width = 256;
  patternCanvas.height = 256;
  const pctx = patternCanvas.getContext('2d');
  const imageData = pctx.createImageData(256, 256);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const noise = Math.random() * 255;
    data[i] = noise;
    data[i + 1] = noise;
    data[i + 2] = noise;
    data[i + 3] = 8; // Very low opacity (3%)
  }

  pctx.putImageData(imageData, 0, 0);
  return ctx.createPattern(patternCanvas, 'repeat');
}

function renderHighlightsCanvas(highlights) {
  const canvas = document.getElementById('highlightsCanvas');
  if (!canvas) return;

  // Always render at 3x for crisp exports regardless of display
  const dpr = 3;
  const W = 1200;
  const H = 630;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Text rendering optimization
  ctx.textRendering = 'optimizeLegibility';
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // Colors (always dark theme for the card)
  const BG_START = '#020617';
  const BG_END = '#0f172a';
  const GOLD = '#D4A04A';
  const TEXT_PRIMARY = '#f1f5f9';
  const TEXT_SECONDARY = '#94a3b8';
  const TEXT_MUTED = '#64748b';
  const SURFACE = '#1e293b';
  const GREEN = '#3FB950';
  const PURPLE = '#BC8CFF';
  const BLUE = '#58A6FF';

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, BG_START);
  grad.addColorStop(1, BG_END);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grain overlay
  const grain = createGrainPattern(ctx);
  ctx.fillStyle = grain;
  ctx.fillRect(0, 0, W, H);

  // Gold accent bars (top and bottom)
  ctx.fillStyle = GOLD;
  ctx.fillRect(0, 0, W, 4);
  ctx.fillRect(0, H - 4, W, 4);

  // Layout constants
  const PADDING_X = 48;
  const CONTENT_WIDTH = W - (PADDING_X * 2); // 1104px

  // Title
  ctx.font = '700 36px "Fira Sans", sans-serif';
  ctx.fillStyle = TEXT_PRIMARY;
  ctx.fillText('CLAUDE USAGE', PADDING_X, 60);

  // Date range (top right)
  const dateText = highlights.dateRange.from && highlights.dateRange.to
    ? `${formatDate(highlights.dateRange.from)} – ${formatDate(highlights.dateRange.to)}`
    : 'All time';
  ctx.font = '500 16px "Fira Code", monospace';
  ctx.fillStyle = TEXT_SECONDARY;
  ctx.textAlign = 'right';
  ctx.fillText(dateText, W - PADDING_X, 45);

  // Streak badge
  if (highlights.streak > 0) {
    ctx.fillStyle = '#F0883E';
    ctx.fillText(`🔥 ${highlights.streak} day streak`, W - PADDING_X, 70);
  }
  ctx.textAlign = 'left';

  // Stat boxes - spread across full width
  const boxY = 95;
  const boxH = 100;
  const boxW = 340;
  const boxGap = 42;

  // Box 1: Total Cost
  drawStatBox(ctx, PADDING_X, boxY, boxW, boxH, {
    value: fmtDollars(highlights.totalCost),
    label: 'total cost',
    accentColor: GOLD,
    trend: highlights.costTrend
  });

  // Box 2: Cache Savings
  drawStatBox(ctx, PADDING_X + boxW + boxGap, boxY, boxW, boxH, {
    value: fmtDollars(highlights.savedByCaching),
    label: `${fmtCacheRatio(highlights.cacheRatio)} leverage`,
    sublabel: highlights.cacheStatus.label,
    accentColor: GREEN,
    trend: highlights.savingsTrend
  });

  // Box 3: Sessions & Queries
  drawStatBox(ctx, PADDING_X + (boxW + boxGap) * 2, boxY, boxW, boxH, {
    value: `${highlights.totalSessions}`,
    label: 'sessions',
    sublabel: `${highlights.totalQueries.toLocaleString()} queries`,
    accentColor: PURPLE
  });

  // Badges section - full width container
  if (highlights.badges.length > 0) {
    const badgeY = 215;
    ctx.fillStyle = SURFACE;
    roundRect(ctx, PADDING_X, badgeY, CONTENT_WIDTH, 90, 8);
    ctx.fill();

    ctx.font = '600 14px "Fira Sans", sans-serif';
    ctx.fillStyle = TEXT_MUTED;
    ctx.fillText('BADGES EARNED', PADDING_X + 20, badgeY + 25);

    let badgeX = PADDING_X + 20;
    highlights.badges.forEach((badge, i) => {
      ctx.font = '400 28px sans-serif';
      ctx.fillText(badge.icon, badgeX, badgeY + 60);

      ctx.font = '600 16px "Fira Sans", sans-serif';
      ctx.fillStyle = TEXT_PRIMARY;
      ctx.fillText(badge.name, badgeX + 40, badgeY + 50);

      ctx.font = '400 14px "Fira Code", monospace';
      ctx.fillStyle = TEXT_SECONDARY;
      ctx.fillText(`${badge.value} ${badge.desc}`, badgeX + 40, badgeY + 70);

      badgeX += 340; // wider spacing for full-width layout
    });
  }

  // Model Mix section - expanded bars
  const modelY = highlights.badges.length > 0 ? 325 : 225;
  ctx.font = '600 14px "Fira Sans", sans-serif';
  ctx.fillStyle = TEXT_MUTED;
  ctx.fillText('MODEL MIX', PADDING_X, modelY);

  const modelColors = { 'Opus': PURPLE, 'Sonnet': GREEN, 'Haiku': GOLD };
  let modelBarY = modelY + 15;
  highlights.models.forEach(model => {
    const barW = Math.max(20, (model.pct / 100) * 400);
    ctx.fillStyle = modelColors[model.name] || BLUE;
    roundRect(ctx, PADDING_X, modelBarY, barW, 24, 4);
    ctx.fill();

    ctx.font = '500 14px "Fira Code", monospace';
    ctx.fillStyle = TEXT_PRIMARY;
    ctx.fillText(`${model.name} ${Math.round(model.pct)}%`, 460, modelBarY + 17);

    modelBarY += 35;
  });

  // Top Tools section - moved right for better separation
  const toolsStartX = 600;
  ctx.font = '600 14px "Fira Sans", sans-serif';
  ctx.fillStyle = TEXT_MUTED;
  ctx.fillText('TOP TOOLS', toolsStartX, modelY);

  let toolBarY = modelY + 15;
  highlights.topTools.forEach(tool => {
    const barW = Math.max(20, (tool.pct / 100) * 350);
    ctx.fillStyle = BLUE;
    roundRect(ctx, 750, toolBarY, barW, 24, 4);
    ctx.fill();

    ctx.font = '500 14px "Fira Code", monospace';
    ctx.fillStyle = TEXT_SECONDARY;
    ctx.textAlign = 'right';
    ctx.fillText(tool.name, 740, toolBarY + 17);
    ctx.textAlign = 'left';

    ctx.fillStyle = TEXT_PRIMARY;
    ctx.fillText(fmt(tool.count), 1110, toolBarY + 17);

    toolBarY += 35;
  });

  // Footer
  ctx.font = '400 14px "Fira Sans", sans-serif';
  ctx.fillStyle = TEXT_MUTED;
  ctx.fillText('claude-usage-monitor', PADDING_X, H - 25);

  ctx.textAlign = 'right';
  ctx.fillStyle = TEXT_SECONDARY;
  ctx.fillText('Claude Code', W - PADDING_X, H - 25);
  ctx.textAlign = 'left';
}

function drawStatBox(ctx, x, y, w, h, opts) {
  const { value, label, sublabel, accentColor, trend } = opts;

  // Box background
  ctx.fillStyle = '#1e293b';
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill();

  // Accent top border
  ctx.fillStyle = accentColor;
  roundRect(ctx, x, y, w, 3, [8, 8, 0, 0]);
  ctx.fill();

  // Value - larger font for crisp exports
  ctx.font = '700 38px "Fira Code", monospace';
  ctx.fillStyle = '#f1f5f9';
  ctx.fillText(value, x + 20, y + 48);

  // Label
  ctx.font = '400 16px "Fira Sans", sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(label, x + 20, y + 72);

  // Sublabel or trend
  if (sublabel) {
    ctx.font = '500 14px "Fira Code", monospace';
    ctx.fillStyle = accentColor;
    ctx.fillText(sublabel, x + 20, y + 92);
  }

  if (trend) {
    const arrow = trend.dir === 'up' ? '↑' : '↓';
    const color = trend.dir === 'up' ? '#F85149' : '#3FB950';
    ctx.font = '500 16px "Fira Code", monospace';
    ctx.fillStyle = color;
    ctx.textAlign = 'right';
    ctx.fillText(`${arrow} ${Math.abs(trend.pct).toFixed(0)}%`, x + w - 16, y + 48);
    ctx.textAlign = 'left';
  }
}

function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = [r, r, r, r];
  ctx.beginPath();
  ctx.moveTo(x + r[0], y);
  ctx.lineTo(x + w - r[1], y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
  ctx.lineTo(x + w, y + h - r[2]);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
  ctx.lineTo(x + r[3], y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
  ctx.lineTo(x, y + r[0]);
  ctx.quadraticCurveTo(x, y, x + r[0], y);
  ctx.closePath();
}

async function showHighlightsModal() {
  const modal = document.getElementById('highlightsModal');
  if (!modal) return;

  highlightsTriggerElement = document.activeElement;

  const highlights = computeHighlightsData();
  if (!highlights) {
    showHighlightsToast('No data available to generate highlights', true);
    return;
  }

  // Wait for fonts before rendering to prevent fallback font rendering
  await document.fonts.ready;

  renderHighlightsCanvas(highlights);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus the modal
  modal.focus();
}

function closeHighlightsModal() {
  const modal = document.getElementById('highlightsModal');
  if (modal) modal.classList.remove('open');
  document.body.style.overflow = '';

  if (highlightsTriggerElement && typeof highlightsTriggerElement.focus === 'function') {
    highlightsTriggerElement.focus();
  }
  highlightsTriggerElement = null;
}

function downloadHighlightsPNG() {
  const canvas = document.getElementById('highlightsCanvas');
  if (!canvas) return;

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `claude-highlights-${date}.png`;
    a.click();
    URL.revokeObjectURL(url);
    showHighlightsToast('Downloaded!');
  }, 'image/png');
}

async function copyHighlightsToClipboard() {
  const canvas = document.getElementById('highlightsCanvas');
  if (!canvas) return;

  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]);
    showHighlightsToast('Copied to clipboard!');
  } catch (err) {
    // Fallback for browsers that don't support clipboard.write
    showHighlightsToast('Copy not supported in this browser. Use Download instead.', true);
  }
}

function showHighlightsToast(message, isError = false) {
  const toast = document.getElementById('highlightsToast');
  if (!toast) return;

  toast.textContent = message;
  toast.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  toast.style.color = isError ? 'var(--red)' : 'var(--green)';
  toast.classList.add('show');

  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Highlights modal event handlers
document.getElementById('highlightsModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'highlightsModal') closeHighlightsModal();
});

document.addEventListener('keydown', (e) => {
  const modal = document.getElementById('highlightsModal');
  if (!modal?.classList.contains('open')) return;

  if (e.key === 'Escape') {
    closeHighlightsModal();
  }
});
